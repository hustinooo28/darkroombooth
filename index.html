<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>darkroom — photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="light"] {
  --bg:          #f5f1eb;
  --surface:     #ffffff;
  --surface2:    #f0ece4;
  --border:      #ddd5c8;
  --text:        #1a1612;
  --text-dim:    #6b6158;
  --text-muted:  #a09488;
  --amber:       #c07810;
  --amber-bg:    rgba(192,120,16,.10);
  --amber-glow:  rgba(192,120,16,.22);
  --pol-paper:   #fffef9;
  --pol-border:  #ede5d8;
  --pol-shadow:  0 3px 16px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.07);
  --pol-hover:   0 10px 32px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.10);
  --meta-col:    #8a7a68;
  --act-border:  #c8b8a8;
  --grain-op:    .14;
  --vig:         rgba(205,196,182,.45);
  --vf-bg:       #ddd8d0;
  --sheet-bg:    rgba(245,241,235,.96);
  --scrollbar:   #c8bfb4;
}
[data-theme="dark"] {
  --bg:          #0c0b09;
  --surface:     #131210;
  --surface2:    #1c1a17;
  --border:      #2d2a24;
  --text:        #e6ddd0;
  --text-dim:    #7a7060;
  --text-muted:  #4e4840;
  --amber:       #e0981c;
  --amber-bg:    rgba(224,152,28,.10);
  --amber-glow:  rgba(224,152,28,.20);
  --pol-paper:   #f5f0e8;
  --pol-border:  #ede5d8;
  --pol-shadow:  0 4px 20px rgba(0,0,0,.55), 0 1px 4px rgba(0,0,0,.30);
  --pol-hover:   0 12px 36px rgba(0,0,0,.65), 0 2px 8px rgba(0,0,0,.40);
  --meta-col:    #8a7060;
  --act-border:  #c0ae98;
  --grain-op:    .28;
  --vig:         rgba(8,6,4,.60);
  --vf-bg:       #0c0b09;
  --sheet-bg:    rgba(19,18,16,.96);
  --scrollbar:   #2d2a24;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: background .25s, color .25s;
  -webkit-tap-highlight-color: transparent;
}

/* Grain overlay */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  background-size:200px 200px; opacity:var(--grain-op); mix-blend-mode:multiply;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9998;
  background:radial-gradient(ellipse at center, transparent 40%, var(--vig) 100%);
}

/* ════════════════════════════════════════
   MOBILE-FIRST LAYOUT (default, ≤768px)
   ════════════════════════════════════════ */

.app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 48px;
  min-height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: relative; z-index: 100;
  flex-shrink: 0;
}
.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; color: var(--amber);
  display: flex; align-items: baseline; gap: 6px;
}
.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px; color: var(--text-muted);
  font-style: italic; letter-spacing: .06em;
}
.hdr-right { display: flex; gap: 6px; align-items: center; }

.pill {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 100px;
  border: 1px solid var(--border); color: var(--text-dim);
  white-space: nowrap;
}
.pill.live {
  border-color: var(--amber); color: var(--amber);
  background: var(--amber-bg); display: flex; align-items: center; gap: 4px;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--amber); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.cam-label-pill { display: none; }

.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text-dim); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { transform: scale(.9); }
.icon-btn.on { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }

/* ── Viewfinder fills remaining space ── */
.vf-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--vf-bg);
  min-height: 0;
}
#video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
#canvas { display: none; }
#video.mirrored { transform: scaleX(-1); }

.vf-overlay { position: absolute; inset: 0; pointer-events: none; }
.corner { position: absolute; width: 18px; height: 18px; border-color: var(--amber); border-style: solid; opacity: .65; }
.corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
.corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

.flash-el { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity .04s; }
.flash-el.on { opacity: 1; }

.cd-num {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'DM Serif Display', serif; font-size: 88px; color: #fff;
  text-shadow: 0 4px 28px rgba(0,0,0,.75); opacity: 0; transition: opacity .18s; z-index: 10; line-height: 1;
}
.cd-num.show { opacity: 1; }

.vf-tag {
  position: absolute; bottom: 10px; left: 10px;
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--amber);
  letter-spacing: .14em; text-transform: uppercase;
  background: rgba(0,0,0,.55); padding: 3px 7px; border-radius: 2px;
  border: 1px solid rgba(180,110,10,.4);
}

.no-cam {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: var(--vf-bg);
}
.no-cam svg { opacity: .18; }
.no-cam p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase; }

/* ── Bottom control bar (mobile) ── */
.bottom-bar {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: relative; z-index: 50;
  padding: env(safe-area-inset-bottom, 0px) 0 0;
}

/* Filter strip */
.filter-strip {
  display: flex;
  gap: 0;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-strip::-webkit-scrollbar { display: none; }

.fchip {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
  border: 1px solid transparent; transition: all .15s;
  flex-shrink: 0; min-width: 54px;
}
.fchip:active { transform: scale(.94); }
.fchip.active { background: var(--amber-bg); border-color: var(--amber); }
.fthumb {
  width: 34px; height: 24px; border-radius: 3px;
  overflow: hidden; border: 1px solid var(--border);
}
.fthumb-inner { width: 100%; height: 100%; background: linear-gradient(135deg,#c8b090,#907060,#604030); }
.fchip-name { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text-dim); letter-spacing: .04em; white-space: nowrap; }
.fchip.active .fchip-name { color: var(--amber); }

/* Action row */
.action-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px 12px;
}

.cam-switcher {
  display: flex; gap: 3px; flex-shrink: 0;
}
.cam-btn {
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 6px 8px; border-radius: 5px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all .15s;
  white-space: nowrap; line-height: 1;
}
.cam-btn:active { transform: scale(.92); }
.cam-btn.active { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }

.timer-sel {
  font-family: 'DM Mono', monospace; font-size: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 7px 8px; border-radius: 5px;
  cursor: pointer; outline: none; flex: 1; min-width: 0;
  transition: border-color .15s;
}

.shoot-btn {
  padding: 10px 20px;
  background: var(--amber); border: none; border-radius: 7px;
  color: #fff; font-family: 'DM Serif Display', serif; font-size: 16px;
  cursor: pointer; transition: all .15s; letter-spacing: .02em;
  flex-shrink: 0; white-space: nowrap;
}
.shoot-btn:active { transform: scale(.95); filter: brightness(.92); }
.shoot-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

.allow-btn {
  flex: 1; padding: 10px;
  background: transparent; border: 1px solid var(--amber); border-radius: 6px;
  color: var(--amber); font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .15s;
}
.allow-btn:active { background: var(--amber-bg); }

/* ── Roll sheet (bottom drawer) ── */
.roll-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--sheet-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 16px 16px 0 0;
  border-top: 1px solid var(--border);
  z-index: 200;
  transform: translateY(calc(100% - 52px));
  transition: transform .32s cubic-bezier(.32,0,.67,0);
  max-height: 88dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.roll-sheet.open {
  transform: translateY(0);
  transition: transform .38s cubic-bezier(.33,1,.68,1);
}

.sheet-handle-area {
  flex-shrink: 0;
  padding: 10px 16px 6px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  user-select: none;
}
.handle-bar {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); flex-shrink: 0;
}
.sheet-header-row {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
}
.shot-ctr {
  font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--amber); line-height: 1;
}
.shot-ctr small {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); margin-left: 2px;
}

.layout-picker { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
.lp-btn {
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 4px 7px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.lp-btn:active { transform: scale(.9); }
.lp-btn.active { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }

.pol-grid {
  flex: 1; padding: 10px 14px 14px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column; gap: 12px;
  min-height: 0;
}
.pol-grid::-webkit-scrollbar { width: 3px; }
.pol-grid::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

.empty-st {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; text-align: center; padding: 32px 0;
}
.empty-st .ei { font-size: 26px; opacity: .2; filter: grayscale(1); }
.empty-st p { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: .14em; text-transform: uppercase; line-height: 2; }

/* Polaroid */
.pol {
  background: var(--pol-paper);
  padding: 7px 7px 32px;
  box-shadow: var(--pol-shadow);
  position: relative; flex-shrink: 0;
  animation: slideUp .28s ease forwards;
  transition: transform .22s ease, box-shadow .22s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px) rotate(var(--tilt,0deg)); }
  to   { opacity: 1; transform: translateY(0) rotate(var(--tilt,0deg)); }
}
.pol-img { width: 100%; display: block; border: 1px solid var(--pol-border); object-fit: cover; }
.pol-foot {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 7px 5px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.p-meta { font-family: 'DM Mono', monospace; font-size: 7px; color: var(--meta-col); line-height: 1.6; }
.p-acts { display: flex; gap: 3px; }
.p-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid var(--act-border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--meta-col); transition: all .15s;
}
.p-btn:active { background: var(--bg); border-color: var(--amber); color: var(--amber); }

.prow { display: grid; gap: 7px; }
.prow.c2 { grid-template-columns: repeat(2,1fr); }
.prow.c3 { grid-template-columns: repeat(3,1fr); }
.prow.c4 { grid-template-columns: repeat(4,1fr); }

.roll-foot {
  padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  display: flex; gap: 6px; background: var(--surface); flex-shrink: 0;
}
.ft-btn {
  flex: 1; padding: 10px 6px;
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: .07em; text-transform: uppercase;
  border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all .15s;
}
.ft-btn:active { transform: scale(.96); }
.ft-btn.pri { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
.ft-btn:disabled { opacity: .28; cursor: not-allowed; transform: none; }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text); color: var(--bg);
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: .07em; padding: 8px 18px;
  border-radius: 100px; z-index: 9997;
  transition: transform .25s ease; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════
   DESKTOP LAYOUT (≥769px)
   ════════════════════════════════════════ */
@media (min-width: 769px) {
  .app {
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr 36px;
    overflow: hidden;
  }

  /* Hide mobile-only elements */
  .bottom-bar { display: none; }
  .roll-sheet { display: none; }
  .toast { bottom: 24px; }

  /* Show desktop header extras */
  .cam-label-pill { display: flex; }

  header {
    height: 52px; padding: 0 24px;
  }
  .logo { font-size: 19px; }
  .pill { font-size: 10px; padding: 4px 10px; }

  /* Desktop 3-column main */
  main.desktop-main {
    display: grid;
    grid-template-columns: 280px 1fr 340px;
    overflow: hidden;
    position: relative; z-index: 1;
  }

  /* Left sidebar */
  .desktop-sidebar {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .sb-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
    flex-shrink: 0;
  }
  .sec-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    color: var(--text-muted); letter-spacing: .18em; text-transform: uppercase;
  }
  .desktop-cam-switcher { display: flex; gap: 4px; }
  .desktop-cam-btn {
    flex: 1; font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 6px 4px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all .15s; text-align: center;
  }
  .desktop-cam-btn:hover { border-color: var(--amber); color: var(--amber); }
  .desktop-cam-btn.active { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
  .mirror-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-track {
    width: 36px; height: 20px; border-radius: 10px;
    background: var(--border); cursor: pointer; position: relative;
    transition: background .2s; border: none; flex-shrink: 0;
  }
  .toggle-track.on { background: var(--amber); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle-track.on .toggle-thumb { left: 19px; }
  .toggle-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); }

  .desktop-filter-list {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .desktop-filter-list::-webkit-scrollbar { width: 3px; }
  .desktop-filter-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }
  .desktop-fchip {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 9px; border-radius: 5px; cursor: pointer;
    border: 1px solid transparent; transition: all .15s;
  }
  .desktop-fchip:hover { background: var(--surface2); border-color: var(--border); }
  .desktop-fchip.active { background: var(--amber-bg); border-color: var(--amber); }
  .desktop-fthumb { width: 38px; height: 28px; border-radius: 3px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); }
  .desktop-fthumb-inner { width: 100%; height: 100%; background: linear-gradient(135deg,#c8b090,#907060,#604030); }
  .desktop-fchip-name { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: .06em; }
  .desktop-fchip.active .desktop-fchip-name { color: var(--amber); }

  .shoot-section {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  .desktop-timer-sel {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 5px;
    cursor: pointer; outline: none; width: 100%; transition: border-color .15s;
  }
  .desktop-timer-sel:hover { border-color: var(--amber); }
  .desktop-shoot-btn {
    width: 100%; padding: 13px;
    background: var(--amber); border: none; border-radius: 6px;
    color: #fff; font-family: 'DM Serif Display', serif; font-size: 17px;
    cursor: pointer; transition: all .15s; letter-spacing: .02em;
  }
  .desktop-shoot-btn:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 18px var(--amber-glow); }
  .desktop-shoot-btn:active { transform: none; filter: none; box-shadow: none; }
  .desktop-shoot-btn:disabled { opacity: .32; cursor: not-allowed; transform: none; }
  .desktop-allow-btn {
    width: 100%; padding: 10px;
    background: transparent; border: 1px solid var(--amber); border-radius: 5px;
    color: var(--amber); font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all .15s;
  }
  .desktop-allow-btn:hover { background: var(--amber-bg); }

  /* Desktop viewfinder */
  .desktop-vf-panel {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; background: var(--bg); overflow: hidden;
  }
  .desktop-vf-wrap {
    position: relative; width: 100%; max-width: 660px;
    background: var(--vf-bg); border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 4/3;
    max-height: calc(100vh - 52px - 36px - 48px);
  }
  .desktop-vf-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Desktop roll panel */
  .desktop-roll-panel {
    display: flex; flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--surface); overflow: hidden;
  }
  .desktop-roll-header {
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; gap: 8px; flex-wrap: wrap;
  }
  .desktop-shot-ctr { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--amber); line-height: 1; }
  .desktop-shot-ctr small { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-left: 2px; }
  .desktop-layout-picker { display: flex; gap: 3px; flex-wrap: wrap; }
  .desktop-lp-btn {
    font-family: 'DM Mono', monospace; font-size: 9px;
    padding: 4px 8px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all .15s;
  }
  .desktop-lp-btn:hover { border-color: var(--amber); color: var(--amber); }
  .desktop-lp-btn.active { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }

  .desktop-pol-grid {
    flex: 1; padding: 14px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
  }
  .desktop-pol-grid::-webkit-scrollbar { width: 3px; }
  .desktop-pol-grid::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }
  .desktop-empty-st {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; text-align: center;
  }
  .desktop-empty-st .ei { font-size: 28px; opacity: .2; filter: grayscale(1); }
  .desktop-empty-st p { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: .14em; text-transform: uppercase; line-height: 2; }
  .desktop-roll-foot {
    padding: 10px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 7px; background: var(--surface); flex-shrink: 0;
  }
  .desktop-ft-btn {
    flex: 1; padding: 9px 6px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: .08em; text-transform: uppercase;
    border-radius: 5px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim);
    cursor: pointer; transition: all .15s;
  }
  .desktop-ft-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .desktop-ft-btn.pri { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .desktop-ft-btn.pri:hover { background: var(--amber-glow); }
  .desktop-ft-btn:disabled { opacity: .28; cursor: not-allowed; }

  footer {
    display: flex; align-items: center; justify-content: center;
    border-top: 1px solid var(--border); background: var(--bg);
    position: relative; z-index: 1; flex-shrink: 0; height: 36px;
  }
  .foot-txt { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: .12em; display: flex; align-items: center; gap: 7px; }
  .foot-handle { color: var(--amber); }
  .foot-dot { color: var(--amber); }

  /* Reusable pol card on desktop too */
  .pol { padding: 8px 8px 34px; }
}

/* Footer hidden on mobile */
footer { display: none; }
@media (min-width: 769px) { footer { display: flex; } }

/* Mobile main is just the vf-panel + bottom-bar */
main { display: contents; }
@media (min-width: 769px) { main { display: grid; } }
</style>

<div class="toast" id="toast"></div>

<script>
// ── Filters ──
const FILTERS = [
  { id:'normal', name:'RAW',    css:'none' },
  { id:'kodak',  name:'KODAK',  css:'sepia(0.2) contrast(1.1) saturate(1.1) brightness(1.05)' },
  { id:'ilford', name:'ILFORD', css:'grayscale(1) contrast(1.2) brightness(1.05)' },
  { id:'lomo',   name:'LOMO',   css:'saturate(1.6) contrast(1.25) brightness(0.88)' },
  { id:'fade',   name:'FADE',   css:'sepia(0.4) saturate(0.8) brightness(1.12) contrast(0.82)' },
  { id:'warm',   name:'WARM',   css:'sepia(0.5) saturate(1.2) brightness(1.1)' },
  { id:'cool',   name:'COOL',   css:'hue-rotate(200deg) saturate(0.85) brightness(1.05)' },
  { id:'velvia', name:'VELVIA', css:'saturate(1.9) contrast(1.18) brightness(0.93)' },
  { id:'mist',   name:'MIST',   css:'brightness(1.22) contrast(0.78) saturate(0.55)' },
];

const L_COLS = { '1x1':1,'1x2':1,'1x4':1,'2x2':2,'2x3':2,'3x3':3 };
const L_TAKE = { '1x1':1,'1x2':2,'1x4':4,'2x2':4,'2x3':6,'3x3':9 };

// ── State ──
let stream=null, facing='environment', filterId='normal';
let photos=[], capturing=false, layout='1x1', dark=false, mirrored=false;
let sheetOpen=false;
const isMobile = ()=>window.innerWidth < 769;

// ── Detect layout ──
function checkLayout(){
  const mob = isMobile();
  document.getElementById('mobile-main').style.display  = mob ? 'contents' : 'none';
  document.getElementById('desktop-main').style.display = mob ? 'none'     : 'grid';
  document.querySelector('.bottom-bar').style.display   = mob ? 'block'    : 'none';
  document.querySelector('.roll-sheet').style.display   = mob ? 'flex'     : 'none';
  // Sync active video element
  if(stream){
    const v = activeVideo();
    v.srcObject = stream;
    const f = FILTERS.find(x=>x.id===filterId);
    v.style.filter = f.css==='none'?'':f.css;
    if(mirrored) v.classList.add('mirrored'); else v.classList.remove('mirrored');
  }
}

function activeVideo(){ return isMobile() ? document.getElementById('video') : document.getElementById('desk-video'); }
function activeCanvas(){ return isMobile() ? document.getElementById('canvas') : document.getElementById('desk-canvas'); }
function activeFlash(){ return isMobile() ? document.getElementById('flash') : document.getElementById('desk-flash'); }
function activeCdNum(){ return isMobile() ? document.getElementById('cdnum') : document.getElementById('desk-cdnum'); }
function activeVfTag(){ return isMobile() ? document.getElementById('vf-tag') : document.getElementById('desk-vf-tag'); }
function activeNoCam(){ return isMobile() ? document.getElementById('no-cam') : document.getElementById('desk-no-cam'); }

// ── Theme ──
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  document.getElementById('theme-btn').textContent = dark?'☀':'☾';
}

// ── Mirror ──
function toggleMirror(){
  mirrored=!mirrored;
  // Mirror both videos
  [document.getElementById('video'), document.getElementById('desk-video')].forEach(v=>{
    v.classList.toggle('mirrored', mirrored);
  });
  document.getElementById('mirror-btn').classList.toggle('on', mirrored);
  const dt = document.getElementById('desk-mirror-toggle');
  if(dt) dt.classList.toggle('on', mirrored);
  showToast(mirrored?'mirror on':'mirror off');
}

// ── Sheet toggle ──
function toggleSheet(){
  sheetOpen=!sheetOpen;
  document.getElementById('roll-sheet').classList.toggle('open', sheetOpen);
}

// Swipe to close sheet
(function(){
  let startY=0, dragging=false;
  const sheet = ()=>document.getElementById('roll-sheet');
  document.addEventListener('touchstart', e=>{
    const s=sheet();
    if(!s.contains(e.target)) return;
    startY=e.touches[0].clientY; dragging=true;
  },{passive:true});
  document.addEventListener('touchend', e=>{
    if(!dragging) return; dragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>60 && sheetOpen){ sheetOpen=false; sheet().classList.remove('open'); }
    else if(dy<-60 && !sheetOpen){ sheetOpen=true; sheet().classList.add('open'); }
  },{passive:true});
})();

// ── Filter chips ──
function buildFilters(){
  // Mobile horizontal strip
  const mobList = document.getElementById('mobile-filter-list');
  // Desktop vertical list
  const deskList = document.getElementById('desktop-filter-list');

  FILTERS.forEach(f=>{
    // Mobile chip
    const mc = document.createElement('div');
    mc.className = 'fchip'+(f.id==='normal'?' active':'');
    mc.dataset.fid = f.id; mc.dataset.ctx='mob';
    mc.onclick = ()=>applyFilter(f.id);
    mc.innerHTML=`<div class="fthumb"><div class="fthumb-inner" style="filter:${f.css==='none'?'none':f.css}"></div></div><div class="fchip-name">${f.name}</div>`;
    mobList.appendChild(mc);

    // Desktop chip
    const dc = document.createElement('div');
    dc.className = 'desktop-fchip'+(f.id==='normal'?' active':'');
    dc.dataset.fid = f.id; dc.dataset.ctx='desk';
    dc.onclick = ()=>applyFilter(f.id);
    dc.innerHTML=`<div class="desktop-fthumb"><div class="desktop-fthumb-inner" style="filter:${f.css==='none'?'none':f.css}"></div></div><div class="desktop-fchip-name">${f.name}</div>`;
    deskList.appendChild(dc);
  });
}

function applyFilter(id){
  filterId=id;
  const f=FILTERS.find(x=>x.id===id);
  const filterVal = f.css==='none'?'':f.css;
  [document.getElementById('video'), document.getElementById('desk-video')].forEach(v=>{ v.style.filter=filterVal; });
  [activeVfTag(), document.getElementById('desk-vf-tag')].forEach(t=>{ if(t) t.textContent=f.name; });
  document.querySelectorAll('.fchip').forEach(c=>c.classList.toggle('active', c.dataset.fid===id));
  document.querySelectorAll('.desktop-fchip').forEach(c=>c.classList.toggle('active', c.dataset.fid===id));
}

// ── Camera ──
async function startCamera(){
  try { await reqCam(facing); }
  catch(e){ showToast('camera access denied'); }
}

async function reqCam(fc){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const c = fc==='any'
    ? {video:{width:{ideal:1920},height:{ideal:1080}},audio:false}
    : {video:{facingMode:fc,width:{ideal:1920},height:{ideal:1080}},audio:false};
  stream = await navigator.mediaDevices.getUserMedia(c);

  // Apply to both video elements
  [document.getElementById('video'), document.getElementById('desk-video')].forEach(v=>{
    v.srcObject = stream;
  });

  const label = stream.getVideoTracks()[0].label||'camera';
  [document.getElementById('no-cam'), document.getElementById('desk-no-cam')].forEach(n=>{ if(n) n.style.display='none'; });
  document.getElementById('mob-shoot-btn').disabled = false;
  document.getElementById('desk-shoot-btn').disabled = false;
  document.getElementById('mob-allow-btn').style.display='none';
  document.getElementById('desk-allow-btn').style.display='none';
  document.getElementById('status-text').textContent='live';
  const cp=document.getElementById('cam-pill');
  cp.textContent=label.length>16?label.slice(0,16)+'…':label; cp.style.display='';
  const f=FILTERS.find(x=>x.id===filterId);
  const filterVal = f.css==='none'?'':f.css;
  [document.getElementById('video'), document.getElementById('desk-video')].forEach(v=>{ v.style.filter=filterVal; });
  showToast('camera active');
}

async function switchCam(fc){
  facing=fc;
  // Update both sets of buttons
  [['mob-btn-rear','mob-btn-front','mob-btn-any'],['desk-btn-rear','desk-btn-front','desk-btn-any']].forEach(set=>{
    set.forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('active'); });
  });
  const map={environment:['mob-btn-rear','desk-btn-rear'],user:['mob-btn-front','desk-btn-front'],any:['mob-btn-any','desk-btn-any']};
  (map[fc]||[]).forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.add('active'); });
  if(stream) try{ await reqCam(fc); } catch(e){ showToast('switch failed'); }
}

// ── Capture ──
async function capturePhoto(){
  if(capturing) return;
  capturing=true;
  document.getElementById('mob-shoot-btn').disabled=true;
  document.getElementById('desk-shoot-btn').disabled=true;
  const timerVal = isMobile()
    ? parseInt(document.getElementById('mob-timer-sel').value)
    : parseInt(document.getElementById('desk-timer-sel').value);
  if(timerVal>0) await runCd(timerVal);
  doCapture();
  capturing=false;
  document.getElementById('mob-shoot-btn').disabled=false;
  document.getElementById('desk-shoot-btn').disabled=false;
}

function runCd(s){
  return new Promise(res=>{
    let n=s;
    [document.getElementById('cdnum'), document.getElementById('desk-cdnum')].forEach(el=>{ if(el){ el.textContent=n; el.classList.add('show'); }});
    const t=setInterval(()=>{
      n--;
      if(n<=0){
        clearInterval(t);
        [document.getElementById('cdnum'), document.getElementById('desk-cdnum')].forEach(el=>{ if(el) el.classList.remove('show'); });
        res();
      } else {
        [document.getElementById('cdnum'), document.getElementById('desk-cdnum')].forEach(el=>{ if(el) el.textContent=n; });
      }
    },1000);
  });
}

function doCapture(){
  [document.getElementById('flash'), document.getElementById('desk-flash')].forEach(el=>{
    if(el){ el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),150); }
  });

  const vid = activeVideo();
  const cnv = activeCanvas();
  const vw=vid.videoWidth||1280, vh=vid.videoHeight||720;
  cnv.width=vw; cnv.height=vh;
  const ctx=cnv.getContext('2d');
  const f=FILTERS.find(x=>x.id===filterId);
  ctx.filter = f.css==='none'?'none':f.css;
  if(mirrored){ ctx.save(); ctx.translate(vw,0); ctx.scale(-1,1); ctx.drawImage(vid,0,0,vw,vh); ctx.restore(); }
  else ctx.drawImage(vid,0,0,vw,vh);
  ctx.filter='none';

  const photo={
    id:   Date.now(),
    data: cnv.toDataURL('image/jpeg',0.94),
    w:vw, h:vh, ar:vw/vh, filter:f.name,
    ts:   new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    tilt: (Math.random()*4-2).toFixed(2),
  };
  photos.unshift(photo);
  updateCounters();
  rebuildGrid();
  updateFoot();
  showToast('shot taken ✦');
  // Auto-open sheet on mobile after first shot
  if(isMobile() && !sheetOpen && photos.length===1){ setTimeout(()=>{ sheetOpen=true; document.getElementById('roll-sheet').classList.add('open'); },400); }
}

function updateCounters(){
  const h=`${photos.length} <small>shots</small>`;
  document.getElementById('mob-shot-ctr').innerHTML=h;
  const dc=document.getElementById('desk-shot-ctr'); if(dc) dc.innerHTML=h;
}

// ── Polaroid element ──
function makePol(photo){
  const div=document.createElement('div');
  div.className='pol'; div.id='ph-'+photo.id;
  div.style.setProperty('--tilt',photo.tilt+'deg');
  div.style.transform=`rotate(${photo.tilt}deg)`;
  const arStyle=`aspect-ratio:${photo.w}/${photo.h};`;
  div.innerHTML=`
    <img class="pol-img" src="${photo.data}" style="${arStyle}" alt="">
    <div class="pol-foot">
      <div class="p-meta"><div>${photo.filter}</div><div>${photo.ts}</div></div>
      <div class="p-acts">
        <button class="p-btn" title="Download" onclick="downloadOne(${photo.id})">↓</button>
        <button class="p-btn" title="Delete"   onclick="deleteOne(${photo.id})">✕</button>
      </div>
    </div>`;
  return div;
}

function rebuildGrid(){
  // Mobile grid
  const mGrid = document.getElementById('pol-grid');
  // Desktop grid
  const dGrid = document.getElementById('desk-pol-grid');

  [mGrid, dGrid].forEach((grid, idx)=>{
    if(!grid) return;
    grid.innerHTML='';
    if(!photos.length){
      const empty = document.createElement('div');
      empty.className = idx===0 ? 'empty-st' : 'desktop-empty-st';
      empty.innerHTML='<div class="ei">📷</div><p>your shots<br>will appear<br>here</p>';
      grid.appendChild(empty);
      return;
    }
    const cols=L_COLS[layout]||1;
    if(cols===1){ photos.forEach(p=>grid.appendChild(makePol(p))); return; }
    for(let i=0;i<photos.length;i+=cols){
      const row=document.createElement('div');
      row.className=`prow c${cols}`;
      for(let j=0;j<cols;j++) if(photos[i+j]) row.appendChild(makePol(photos[i+j]));
      grid.appendChild(row);
    }
  });
}

function setLayout(mode){
  layout=mode;
  document.querySelectorAll('.lp-btn').forEach(b=>b.classList.toggle('active',b.dataset.l===mode));
  document.querySelectorAll('.desktop-lp-btn').forEach(b=>b.classList.toggle('active',b.dataset.l===mode));
  rebuildGrid();
}

// ── framePolaroid ──
function framePolaroid(photo){
  return new Promise(res=>{
    const srcW=photo.w, srcH=photo.h;
    const scale=Math.min(800/srcW,600/srcH,1);
    const imgW=Math.round(srcW*scale), imgH=Math.round(srcH*scale);
    const padSide=24, padTop=24, padBottom=88;
    const fc=document.createElement('canvas');
    fc.width=imgW+padSide*2; fc.height=imgH+padTop+padBottom;
    const ctx=fc.getContext('2d');
    ctx.fillStyle='#fdfaf4'; ctx.fillRect(0,0,fc.width,fc.height);
    const img=new Image();
    img.onload=()=>{
      ctx.drawImage(img,padSide,padTop,imgW,imgH);
      ctx.strokeStyle='#e0d8cc'; ctx.lineWidth=1;
      ctx.strokeRect(padSide,padTop,imgW,imgH);
      ctx.fillStyle='#8a7060'; ctx.font='500 12px "DM Mono",monospace';
      ctx.textAlign='left';
      ctx.fillText(photo.filter,padSide+4,fc.height-56);
      ctx.fillStyle='#b0a090'; ctx.font='11px "DM Mono",monospace';
      ctx.fillText(photo.ts,padSide+4,fc.height-36);
      ctx.fillStyle='#c8a070'; ctx.font='italic 10px Georgia,serif';
      ctx.textAlign='right';
      ctx.fillText('darkroom ✦ @hustino.28',fc.width-padSide,fc.height-16);
      res(fc.toDataURL('image/jpeg',0.94));
    };
    img.src=photo.data;
  });
}

function drawImgCover(ctx,img,x,y,w,h){
  const srcAr=img.naturalWidth/img.naturalHeight, dstAr=w/h;
  let sx=0,sy=0,sw=img.naturalWidth,sh=img.naturalHeight;
  if(srcAr>dstAr){ sw=Math.round(img.naturalHeight*dstAr); sx=Math.round((img.naturalWidth-sw)/2); }
  else{ sh=Math.round(img.naturalWidth/dstAr); sy=Math.round((img.naturalHeight-sh)/2); }
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
}

async function downloadOne(id){
  const p=photos.find(x=>x.id===id); if(!p) return;
  showToast('framing…');
  const url=await framePolaroid(p);
  const a=document.createElement('a'); a.href=url; a.download=`darkroom_${p.id}.jpg`; a.click();
  showToast('downloaded ✦');
}

async function downloadAll(){
  if(!photos.length) return;
  if(photos.length===1){ downloadOne(photos[0].id); return; }
  showToast('building strip…');
  const cols=L_COLS[layout]||1;
  const take=Math.min(photos.length,L_TAKE[layout]||photos.length);
  const sub=photos.slice(0,take);
  const rows=Math.ceil(sub.length/cols);
  const cellW=400,cellH=300,padS=20,padT=20,capH=66,gap=14,headerH=68,footerH=32;
  const sheetW=cols*cellW+(cols-1)*gap+padS*2;
  const sheetH=rows*(cellH+capH)+(rows-1)*gap+padS*2+headerH+footerH;
  const sheet=document.createElement('canvas');
  sheet.width=sheetW; sheet.height=sheetH;
  const ctx=sheet.getContext('2d');
  const isDk=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=isDk?'#0c0b09':'#f5f1eb'; ctx.fillRect(0,0,sheetW,sheetH);
  ctx.fillStyle='#c07810'; ctx.font='italic bold 26px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('darkroom — photobooth',sheetW/2,padT+30);
  ctx.font='11px monospace'; ctx.fillStyle=isDk?'#7a7060':'#9e9488';
  ctx.fillText(`${layout} layout  ✦  ${new Date().toLocaleDateString()}`,sheetW/2,padT+50);
  const loadImg=src=>new Promise(r=>{ const i=new Image(); i.onload=()=>r(i); i.src=src; });
  for(let i=0;i<sub.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const x=padS+col*(cellW+gap), y=padS+headerH+row*(cellH+capH+gap), bdr=9;
    ctx.fillStyle='#fdfaf4'; ctx.fillRect(x-bdr,y-bdr,cellW+bdr*2,cellH+capH+bdr*2);
    const img=await loadImg(sub[i].data);
    ctx.save(); ctx.beginPath(); ctx.rect(x,y,cellW,cellH); ctx.clip();
    drawImgCover(ctx,img,x,y,cellW,cellH);
    ctx.restore();
    ctx.strokeStyle='#e0d8cc'; ctx.lineWidth=1; ctx.strokeRect(x,y,cellW,cellH);
    ctx.fillStyle='#7a6a58'; ctx.font='500 10px monospace'; ctx.textAlign='left';
    ctx.fillText(sub[i].filter,x+4,y+cellH+20);
    ctx.fillStyle='#a09080'; ctx.font='9px monospace';
    ctx.fillText(sub[i].ts,x+4,y+cellH+36);
  }
  ctx.fillStyle=isDk?'#4a4540':'#b0a090'; ctx.font='italic 10px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('made by @hustino.28  ✦  darkroom photobooth',sheetW/2,sheetH-10);
  const a=document.createElement('a');
  a.href=sheet.toDataURL('image/jpeg',0.94);
  a.download=`darkroom_strip_${Date.now()}.jpg`; a.click();
  showToast('strip downloaded ✦');
}

function deleteOne(id){ photos=photos.filter(p=>p.id!==id); updateCounters(); rebuildGrid(); updateFoot(); }
function clearAll(){ if(!photos.length) return; photos=[]; updateCounters(); rebuildGrid(); updateFoot(); showToast('roll cleared'); }
function updateFoot(){
  ['clear-btn','desk-clear-btn'].forEach(id=>{ const el=document.getElementById(id); if(el) el.disabled=!photos.length; });
  ['dl-btn','desk-dl-btn'].forEach(id=>{ const el=document.getElementById(id); if(el){ el.disabled=!photos.length; el.textContent=photos.length>1?'download strip':'download'; }});
}

// ── Toast ──
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Init ──
buildFilters();
checkLayout();
window.addEventListener('resize', checkLayout);

// Try auto-start
navigator.mediaDevices.enumerateDevices()
  .then(devs=>{ if(devs.some(d=>d.kind==='videoinput'&&d.label)) startCamera(); })
  .catch(()=>{});

// Show allow button if camera not auto-started (fallback)
setTimeout(()=>{
  if(!stream){
    document.getElementById('mob-allow-btn').style.display='flex';
    document.getElementById('desk-allow-btn').style.display='block';
  }
},1000);
</script>
