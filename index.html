<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>darkroom — photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── Themes ── */
[data-theme="light"]{
  --bg:#f5f1eb; --surface:#ffffff; --surface2:#f0ece4; --border:#ddd5c8;
  --text:#1a1612; --text-dim:#6b6158; --text-muted:#a09488;
  --amber:#c07810; --amber-bg:rgba(192,120,16,.10); --amber-glow:rgba(192,120,16,.22);
  --pol-paper:#fffef9; --pol-border:#ede5d8;
  --pol-shadow:0 3px 16px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.07);
  --pol-hover:0 10px 32px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.10);
  --meta-col:#8a7a68; --act-border:#c8b8a8;
  --grain-op:.14; --vig:rgba(205,196,182,.45);
  --vf-bg:#1a1612; --sheet-bg:rgba(245,241,235,.97); --scrollbar:#c8bfb4;
  --overlay-btn:rgba(0,0,0,.55); --overlay-btn-border:rgba(255,255,255,.15);
}
[data-theme="dark"]{
  --bg:#0c0b09; --surface:#131210; --surface2:#1c1a17; --border:#2d2a24;
  --text:#e6ddd0; --text-dim:#7a7060; --text-muted:#4e4840;
  --amber:#e0981c; --amber-bg:rgba(224,152,28,.10); --amber-glow:rgba(224,152,28,.20);
  --pol-paper:#f5f0e8; --pol-border:#ede5d8;
  --pol-shadow:0 4px 20px rgba(0,0,0,.55),0 1px 4px rgba(0,0,0,.30);
  --pol-hover:0 12px 36px rgba(0,0,0,.65),0 2px 8px rgba(0,0,0,.40);
  --meta-col:#8a7060; --act-border:#c0ae98;
  --grain-op:.24; --vig:transparent;
  --vf-bg:#0c0b09; --sheet-bg:rgba(13,12,10,.97); --scrollbar:#2d2a24;
  --overlay-btn:rgba(0,0,0,.65); --overlay-btn-border:rgba(255,255,255,.10);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;}

/* Grain */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:var(--grain-op);mix-blend-mode:multiply;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:radial-gradient(ellipse at center,transparent 40%,var(--vig) 100%);
}

.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

header{
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;height:48px;min-height:48px;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:relative;z-index:100;flex-shrink:0;
}
.logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--amber);display:flex;align-items:baseline;gap:6px;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);font-style:italic;letter-spacing:.06em;}
.hdr-right{display:flex;gap:6px;align-items:center;}

.pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:100px;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap;}
.pill.live{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);display:flex;align-items:center;gap:4px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.icon-btn{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text-dim);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{border-color:var(--amber);color:var(--amber);}
.icon-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}

/* ── Film Strip Aesthetic Layouts ── */
.film-strip-item{
  background:#11110f; color:#e6ddd0; padding:24px 14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.35); position:relative;
  display:flex; flex-direction:column; align-items:center;
  border-radius:2px; animation:slideUp .28s ease forwards;
}
.film-strip-item::before, .film-strip-item::after{
  content:''; position:absolute; top:0; bottom:0; width:10px;
  background-image: radial-gradient(circle, #000 40%, transparent 45%);
  background-size: 10px 14px; background-repeat: repeat-y;
}
.film-strip-item::before{left:3px;}
.film-strip-item::after{right:3px;}

.strip-frame-wrap{
  width:100%; background:#000; border:1px solid #221f1a;
  padding:4px; position:relative; aspect-ratio:1/1; /* 1:1 Square Frame Design */
}
.strip-img{width:100%; height:100%; display:block; object-fit:cover;}

.strip-meta{
  width:100%; display:flex; justify-content:space-between; align-items:center;
  margin-top:8px; font-family:'DM Mono',monospace; font-size:8px;
  color:#8a7060; padding:0 4px;
}
.strip-info{display:flex;flex-direction:column;gap:1px;}
.strip-acts{display:flex;gap:4px;}
.strip-btn{
  width:22px;height:22px;border-radius:4px; border:1px solid #3a352e;
  background:transparent; cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:10px; color:#a09080; transition:all .15s;
}
.strip-btn:hover{background:#25221c;color:var(--amber);border-color:var(--amber);}

.prow{display:grid;gap:14px;width:100%;}
.prow.c2{grid-template-columns:repeat(2,1fr);}
.prow.c3{grid-template-columns:repeat(3,1fr);}
.prow.c4{grid-template-columns:repeat(4,1fr);}

/* Toast */
.toast{
  position:fixed;bottom:120px;left:50%; transform:translateX(-50%) translateY(60px);
  background:var(--text);color:var(--bg); font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:.07em;padding:8px 18px; border-radius:100px;z-index:10000;
  transition:transform .25s ease;white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ══════════════════════════════════════
   MOBILE LAYOUT  (< 769px)
══════════════════════════════════════ */
.vf-panel{
  flex:1;position:relative;overflow:hidden; background:var(--vf-bg);
  min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:12px;
}
.vf-track-wrap{
  position:relative; width:100%; max-height:65vh; aspect-ratio:1/1; /* Native Square view rendering */
  background:#11110f; padding:16px 12px; display:flex; align-items:center; justify-content:center;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}
.vf-track-wrap::before, .vf-track-wrap::after{
  content:''; position:absolute; top:0; bottom:0; width:8px;
  background-image: radial-gradient(circle, #000 40%, transparent 45%);
  background-size: 8px 12px; background-repeat: repeat-y; opacity:0.85;
}
.vf-track-wrap::before{left:2px;}
.vf-track-wrap::after{right:2px;}

.vf-inner-frame{
  position:relative; width:100%; height:100%; background:#000; overflow:hidden; aspect-ratio:1/1;
}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}
#video.mirrored{transform:scaleX(-1);}

.vf-overlay{position:absolute;inset:0;pointer-events:none;z-index:3;}
.corner{position:absolute;width:14px;height:14px;border-color:var(--amber);border-style:solid;opacity:.6;}
.corner.tl{top:8px;left:8px;border-width:2px 0 0 2px;}
.corner.tr{top:8px;right:8px;border-width:2px 2px 0 0;}
.corner.bl{bottom:8px;left:8px;border-width:0 0 2px 2px;}
.corner.br{bottom:8px;right:8px;border-width:0 2px 2px 0;}

.flash-el{ position:absolute;inset:0;background:#ffffff;opacity:0;pointer-events:none;z-index:8;mix-blend-mode: overlay;}
.cd-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'DM Serif Display',serif;font-size:72px;color:#fff;
  text-shadow:0 4px 28px rgba(0,0,0,.75);opacity:0;transition:opacity .18s;z-index:10;line-height:1;
}
.cd-num.show{opacity:1;}

.vf-tag{
  position:absolute;bottom:8px;left:8px; font-family:'DM Mono',monospace;font-size:8px;color:var(--amber);
  letter-spacing:.14em;text-transform:uppercase; background:rgba(0,0,0,.75);padding:3px 6px;border-radius:2px;
  border:1px solid rgba(180,110,10,.3);pointer-events:none;z-index:4;
}

.no-cam{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px; background:#11110f;z-index:9;
}
.no-cam svg{opacity:.2; color:#fff;}
.no-cam-label{font-family:'DM Mono',monospace;font-size:10px;color:#7a7060;letter-spacing:.1em;text-transform:uppercase;}
.no-cam-btn{
  padding:10px 22px; background:var(--amber);border:none;border-radius:6px;
  color:#fff;font-family:'DM Serif Display',serif;font-size:14px;
  cursor:pointer;letter-spacing:.02em;transition:all .15s;
}

/* Redesigned Mobile Utilities Placement to prevent overlapping interaction blocks */
.vf-utility-bar{
  width:100%; max-width:400px; display:flex; justify-content:space-between;
  align-items:center; padding:8px 4px 0 4px; z-index:25;
}
.vf-controls-group{ display:flex; gap:6px; }
.vf-ctrl-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-dim);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center; transition:all .15s;
}
.vf-ctrl-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}

.vf-cam-row{ display:flex;gap:4px; }
.vf-cam-btn{
  font-family:'DM Mono',monospace;font-size:8px; padding:6px 9px;border-radius:4px;
  background:var(--surface2);border:1px solid var(--border); color:var(--text-dim);cursor:pointer;transition:all .15s;
}
.vf-cam-btn.active{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}

/* Bottom bar */
.bottom-bar{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);position:relative;z-index:50;}
.filter-strip{display:flex;overflow-x:auto;overflow-y:hidden;padding:7px 10px;border-bottom:1px solid var(--border);gap:2px;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.fchip{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 7px;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:all .15s;flex-shrink:0;min-width:50px;}
.fchip.active{background:var(--amber-bg);border-color:var(--amber);}
.fthumb{width:32px;height:22px;border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.fthumb-inner{width:100%;height:100%;background:linear-gradient(135deg,#c8b090,#907060,#604030);}
.fchip-name{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:.03em;white-space:nowrap;}
.fchip.active .fchip-name{color:var(--amber);}

.shoot-row{display:flex;align-items:center;gap:8px;padding:9px 14px calc(9px + env(safe-area-inset-bottom,0px));}
.timer-sel{font-family:'DM Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:5px;cursor:pointer;outline:none;flex:1;min-width:0;}
.mob-shoot-btn{padding:10px 22px;background:var(--amber);border:none;border-radius:7px;color:#fff;font-family:'DM Serif Display',serif;font-size:16px;cursor:pointer;transition:all .15s;letter-spacing:.02em;flex-shrink:0;}
.mob-shoot-btn:disabled{opacity:.3;}

/* Roll drawer */
.roll-sheet{
  position:fixed;bottom:0;left:0;right:0;background:var(--sheet-bg);backdrop-filter:blur(14px);
  border-radius:16px 16px 0 0;border-top:1px solid var(--border);z-index:200;
  transform:translateY(calc(100% - 50px));transition:transform .32s cubic-bezier(.32,0,.67,0);
  max-height:85dvh;display:flex;flex-direction:column;overflow:hidden;
}
.roll-sheet.open{transform:translateY(0);transition:transform .38s cubic-bezier(.33,1,.68,1);}
.sheet-handle{flex-shrink:0;padding:10px 16px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;user-select:none;}
.handle-bar{width:36px;height:4px;border-radius:2px;background:var(--border);}
.sheet-header{width:100%;display:flex;align-items:center;justify-content:space-between;}
.shot-ctr{font-family:'DM Serif Display',serif;font-size:19px;color:var(--amber);line-height:1;}
.shot-ctr small{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-left:2px;}
.layout-picker{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.lp-btn{font-family:'DM Mono',monospace;font-size:9px;padding:4px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.lp-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

.pol-grid{flex:1;padding:12px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;min-height:0;}
.pol-grid::-webkit-scrollbar{width:3px;}
.pol-grid::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:28px 0;}
.empty-st .ei{font-size:26px;opacity:.18;}
.empty-st p{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;line-height:2;}

.roll-foot{padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);display:flex;gap:6px;background:var(--surface);flex-shrink:0;}
.ft-btn{flex:1;padding:10px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.ft-btn.pri{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
.ft-btn:disabled{opacity:.28;}

/* ══════════════════════════════════════
   DESKTOP LAYOUT  (≥ 769px)
══════════════════════════════════════ */
@media(min-width:769px){
  .bottom-bar,.roll-sheet,.vf-utility-bar{display:none!important;}
  .toast{bottom:28px;}

  .app{height:100vh;display:grid;grid-template-rows:52px 1fr 34px;}
  header{height:52px;padding:0 24px;}
  .logo{font-size:19px;}
  .pill{font-size:10px;padding:4px 10px;}
  .icon-btn{width:30px;height:30px;}

  .desk-main{display:grid;grid-template-columns:256px 1fr 340px;overflow:hidden;}

  .desk-sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden;}
  .sb-block{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px;flex-shrink:0;}
  .sb-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.18em;text-transform:uppercase;}
  .desk-cam-sw{display:flex;gap:3px;}
  .desk-cam-btn{flex:1;font-family:'DM Mono',monospace;font-size:10px;padding:6px 4px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;text-align:center;}
  .desk-cam-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

  .mirror-row{display:flex;align-items:center;justify-content:space-between;}
  .toggle-track{width:34px;height:19px;border-radius:10px;background:var(--border);cursor:pointer;position:relative;border:none;flex-shrink:0;}
  .toggle-track.on{background:var(--amber);}
  .toggle-thumb{position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;}
  .toggle-track.on .toggle-thumb{left:18px;}
  .toggle-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}

  .desk-filter-list{flex:1;overflow-y:auto;padding:7px 10px;display:flex;flex-direction:column;gap:3px;}
  .desk-filter-list::-webkit-scrollbar{width:3px;}
  .desk-filter-list::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}
  .desk-fchip{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .desk-fchip.active{background:var(--amber-bg);border-color:var(--amber);}
  .desk-fthumb{width:36px;height:26px;border-radius:3px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);}
  .desk-fthumb-inner{width:100%;height:100%;background:linear-gradient(135deg,#c8b090,#907060,#604030);}
  .desk-fchip-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.05em;}
  .desk-fchip.active .desk-fchip-name{color:var(--amber);}

  .desk-shoot-section{padding:11px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
  .desk-timer{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;cursor:pointer;outline:none;width:100%;}
  .desk-shoot-btn{width:100%;padding:12px;background:var(--amber);border:none;border-radius:6px;color:#fff;font-family:'DM Serif Display',serif;font-size:16px;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
  .desk-shoot-btn:disabled{opacity:.32;}
  .desk-allow-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--amber);border-radius:5px;color:var(--amber);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;}

  .desk-vf{display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);overflow:hidden;}
  .desk-film-housing{
    position:relative; width:100%; max-width:440px; background:#11110f;
    padding:24px 16px; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 12px 36px rgba(0,0,0,0.45); border-radius:4px;
  }
  .desk-film-housing::before, .desk-film-housing::after{
    content:''; position:absolute; top:0; bottom:0; width:10px;
    background-image: radial-gradient(circle, #000 40%, transparent 45%);
    background-size: 10px 14px; background-repeat: repeat-y; opacity:0.9;
  }
  .desk-film-housing::before{left:3px;}
  .desk-film-housing::after{right:3px;}

  .desk-vf-wrap{
    position:relative; width:100%; background:#000; overflow:hidden;
    border:1px solid #221f1a; aspect-ratio:1/1; /* Desktop Preview Box is also Square */
    max-height:calc(100vh - 52px - 34px - 88px);
  }
  .desk-vf-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
  .desk-vf-wrap video.mirrored{transform:scaleX(-1);}

  .desk-no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#11110f;z-index:9;}
  .desk-no-cam svg{opacity:.2; color:#fff;}
  .desk-no-cam-label{font-family:'DM Mono',monospace;font-size:11px;color:#7a7060;letter-spacing:.1em;text-transform:uppercase;}

  .desk-vf-overlay{position:absolute;inset:0;pointer-events:none;z-index:3;}
  .desk-flash{position:absolute;inset:0;background:#ffffff;opacity:0;pointer-events:none;z-index:8;mix-blend-mode:overlay;}
  .desk-cdnum{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'DM Serif Display',serif;font-size:88px;color:#fff;
    text-shadow:0 4px 28px rgba(0,0,0,.75);opacity:0;transition:opacity .18s;z-index:10;line-height:1;
  }
  .desk-cdnum.show{opacity:1;}
  .desk-vf-tag{
    position:absolute;bottom:10px;left:10px; font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);
    letter-spacing:.14em;text-transform:uppercase; background:rgba(0,0,0,.75);padding:3px 7px;border-radius:2px;
    border:1px solid rgba(180,110,10,.3);z-index:4;
  }

  .desk-roll{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);overflow:hidden;}
  .desk-roll-hdr{padding:11px 14px 9px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;gap:8px;}
  .desk-shot-ctr{font-family:'DM Serif Display',serif;font-size:24px;color:var(--amber);line-height:1;}
  .desk-shot-ctr small{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-left:2px;}
  .desk-layout-picker{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
  .desk-lp-btn{font-family:'DM Mono',monospace;font-size:9px;padding:4px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;}
  .desk-lp-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

  .desk-pol-grid{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .desk-pol-grid::-webkit-scrollbar{width:3px;}
  .desk-pol-grid::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}
  .desk-pol-grid .film-strip-item:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.5);z-index:10;transition:all 0.2s;}
  .desk-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;}
  .desk-empty .ei{font-size:28px;opacity:.18;}
  .desk-empty p{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;line-height:2;}

  .desk-roll-foot{padding:9px 12px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--surface);flex-shrink:0;}
  .desk-ft-btn{flex:1;padding:9px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;}
  .desk-ft-btn.pri{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
  .desk-ft-btn:disabled{opacity:.28;}

  footer{display:flex;align-items:center;justify-content:center;border-top:1px solid var(--border);background:var(--bg);position:relative;z-index:1;flex-shrink:0;height:34px;}
  .foot-txt{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.12em;display:flex;align-items:center;gap:7px;}
  .foot-handle{color:var(--amber);}
  .foot-dot{color:var(--amber);}
}

.desk-main,.desk-sidebar,.desk-vf,.desk-roll,footer{display:none;}
@media(min-width:769px){

  .desk-sidebar,.desk-vf,.desk-roll{display:flex;}
  footer{display:flex;}
  .vf-panel,.bottom-bar,.roll-sheet{display:none!important;}
}

<div class="toast" id="toast"></div>

<script>
const FILTERS = [
  { id: 'raw', name: 'RAW', css: 'none' },
  { id: 'classic', name: 'Classic BW', css: 'grayscale(1) contrast(1.1) brightness(0.95)' },
  { id: 'sepia', name: 'Vintage Gold', css: 'sepia(0.85) contrast(0.95) saturate(1.1) hue-rotate(-5deg)' },
  { id: 'cyan', name: 'Muted Cyan', css: 'contrast(1.05) saturate(0.8) hue-rotate(170deg) brightness(0.95)' },
  { id: 'warm', name: 'Earthy Warm', css: 'saturate(1.2) sepia(0.2) contrast(1.02) brightness(0.98)' },
  { id: 'cool', name: 'Chilled Air', css: 'hue-rotate(10deg) saturate(0.85) brightness(1.02)' }
];

let activeStream = null;
let activeFilter = 'raw';
let activeLayout = '1x1';
let currentFacingMode = 'environment';
let isMirrored = false;
let photos = []; 
let activeTimerValue = 0;
let countdownActive = false;

const $ = id => document.getElementById(id);

function showToast(msg) {
  const t = $('toast'); if(!t) return;
  t.innerText = msg; t.classList.add('show');
  clearTimeout(t.to); t.to = setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const target = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', target);
  const btn = $('theme-btn');
  if(btn) btn.innerText = target === 'dark' ? '🌙' : '☀';
}

async function startCamera() {
  if (activeStream) {
    activeStream.getTracks().forEach(track => track.stop());
  }
  const constraints = {
    video: {
      facingMode: currentFacingMode,
      width: { ideal: 1080 },
      height: { ideal: 1080 }
    },
    audio: false
  };
  try {
    activeStream = await navigator.mediaDevices.getUserMedia(constraints);
    ['video', 'desk-video'].forEach(id => {
      const el = $(id);
      if (el) {
        el.srcObject = activeStream;
        el.onloadedmetadata = () => el.play();
      }
    });
    $('status-text').innerText = 'live';
    ['no-cam', 'desk-no-cam'].forEach(id => { const el = $(id); if(el) el.style.display = 'none'; });
    ['mob-shoot-btn', 'desk-shoot-btn'].forEach(id => { const el = $(id); if(el) el.disabled = false; });
    updateCamPill();
  } catch (err) {
    console.error("Camera connection dropped: ", err);
    $('status-text').innerText = 'offline';
    showToast('camera error ✕');
  }
}

function updateCamPill() {
  if(!activeStream) return;
  const track = activeStream.getVideoTracks()[0];
  const pill = $('cam-pill');
  if(pill && track) {
    pill.style.display = 'block';
    const settings = track.getSettings();
    pill.innerText = `${settings.width || 1080}×${settings.height || 1080}`;
  }
}

function switchCam(mode) {
  if(mode === 'any') {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  } else {
    currentFacingMode = mode;
  }
  ['mob-btn-rear','mob-btn-front','desk-btn-rear','desk-btn-front'].forEach(id => {
    if($(id)) $(id).classList.remove('active');
  });
  if(currentFacingMode === 'environment') {
    if($('mob-btn-rear')) $('mob-btn-rear').classList.add('active');
    if($('desk-btn-rear')) $('desk-btn-rear').classList.add('active');
  } else {
    if($('mob-btn-front')) $('mob-btn-front').classList.add('active');
    if($('desk-btn-front')) $('desk-btn-front').classList.add('active');
  }
  startCamera();
}

function toggleMirror() {
  isMirrored = !isMirrored;
  ['video', 'desk-video'].forEach(id => {
    const el = $(id); if(el) el.classList.toggle('mirrored', isMirrored);
  });
  ['mirror-btn', 'mob-mirror-btn'].forEach(id => {
    const el = $(id); if(el) el.classList.toggle('on', isMirrored);
  });
  const deskToggle = $('desk-mirror-toggle');
  if(deskToggle) deskToggle.classList.toggle('on', isMirrored);
}

function selectFilter(id) {
  activeFilter = id;
  const filterObj = FILTERS.find(f => f.id === id);
  ['video', 'desk-video'].forEach(vidId => {
    const el = $(vidId); if(el) el.style.filter = filterObj ? filterObj.css : 'none';
  });
  ['vf-tag', 'desk-vf-tag'].forEach(tagId => {
    const el = $(tagId); if(el) el.innerText = filterObj ? filterObj.name : 'RAW';
  });
  document.querySelectorAll('.fchip, .desk-fchip').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[data-fid="${id}"]`).forEach(el => el.classList.add('active'));
}

function buildFiltersUI() {
  const mobList = $('mob-filter-list');
  const deskList = $('desk-filter-list');
  
  FILTERS.forEach(f => {
    if(mobList) {
      const chip = document.createElement('div');
      chip.className = `fchip ${f.id==='raw'?'active':''}`;
      chip.setAttribute('data-fid', f.id);
      chip.onclick = () => selectFilter(f.id);
      chip.innerHTML = `<div class="fthumb"><div class="fthumb-inner" style="filter:${f.css}"></div></div><div class="fchip-name">${f.name}</div>`;
      mobList.appendChild(chip);
    }
    if(deskList) {
      const dchip = document.createElement('div');
      dchip.className = `desk-fchip ${f.id==='raw'?'active':''}`;
      dchip.setAttribute('data-fid', f.id);
      dchip.onclick = () => selectFilter(f.id);
      dchip.innerHTML = `<div class="desk-fthumb"><div class="desk-fthumb-inner" style="filter:${f.css}"></div></div><div class="desk-fchip-name">${f.name}</div>`;
      deskList.appendChild(dchip);
    }
  });
}

function setLayout(l, e) {
  if(e) e.stopPropagation();
  activeLayout = l;
  document.querySelectorAll('.lp-btn, .desk-lp-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`[data-l="${l}"]`).forEach(b => b.classList.add('active'));
  rebuildGrids();
}

function capturePhoto() {
  if(countdownActive || !activeStream) return;
  const isMobile = window.innerWidth < 769;
  const sel = isMobile ? $('mob-timer') : $('desk-timer');
  const delay = parseInt(sel ? sel.value : 0, 10);
  
  if(delay > 0) {
    countdownActive = true;
    let sec = delay;
    const numEl = isMobile ? $('cdnum') : $('desk-cdnum');
    if(numEl) { numEl.innerText = sec; numEl.classList.add('show'); }
    
    const sInt = setInterval(() => {
      sec--;
      if(sec <= 0) {
        clearInterval(sInt);
        if(numEl) numEl.classList.remove('show');
        countdownActive = false;
        executeCapture();
      } else {
        if(numEl) numEl.innerText = sec;
      }
    }, 1000);
  } else {
    executeCapture();
  }
}

function executeCapture() {
  const videoEl = window.innerWidth < 769 ? $('video') : $('desk-video');
  if(!videoEl) return;
  
  // Enforce precise 1080x1080 pixel square crop capture base
  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1080;
  const ctx = canvas.getContext('2d');
  
  if(isMirrored) {
    ctx.translate(1080, 0);
    ctx.scale(-1, 1);
  }
  
  // Calculate source bounding box parameters to retain strict 1:1 square aspect ratios
  const vW = videoEl.videoWidth;
  const vH = videoEl.videoHeight;
  const minDim = Math.min(vW, vH);
  const sx = (vW - minDim) / 2;
  const sy = (vH - minDim) / 2;
  
  ctx.drawImage(videoEl, sx, sy, minDim, minDim, 0, 0, 1080, 1080);
  
  const filterObj = FILTERS.find(f => f.id === activeFilter);
  if(filterObj && filterObj.css !== 'none') {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 1080; tempCanvas.height = 1080;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.filter = filterObj.css;
    tCtx.drawImage(canvas, 0, 0);
    ctx.clearRect(0,0,1080,1080);
    ctx.drawImage(tempCanvas, 0, 0);
  }
  
  const fTag = filterObj ? filterObj.name : 'RAW';
  const d = new Date();
  const tsStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  
  photos.unshift({
    id: Date.now(),
    src: canvas.toDataURL('image/jpeg', 0.92),
    filter: fTag,
    ts: tsStr
  });
  
  const flashEl = window.innerWidth < 769 ? $('flash') : $('desk-flash');
  if(flashEl) {
    flashEl.style.opacity = '1';
    setTimeout(() => flashEl.style.opacity = '0', 250);
  }
  
  showToast('shot captured ✦');
  updateCounters();
  rebuildGrids();
}

function updateCounters() {
  const cnt = photos.length;
  ['mob-shot-ctr', 'desk-shot-ctr'].forEach(id => {
    const el = $(id); if(el) el.innerHTML = `${cnt} <small>shots</small>`;
  });
}

function getLayoutConfig(layoutCode) {
  switch(layoutCode) {
    case '1x1': return { r: 1, c: 1, total: 1 };
    case '1x2': return { r: 2, c: 1, total: 2 };
    case '1x4': return { r: 4, c: 1, total: 4 };
    case '2x2': return { r: 2, c: 2, total: 4 };
    case '2x3': return { r: 3, c: 2, total: 6 };
    case '3x3': return { r: 3, c: 3, total: 9 };
    default: return { r: 1, c: 1, total: 1 };
  }
}

function rebuildGrids() {
  const mobGrid = $('mob-pol-grid');
  const deskGrid = $('desk-pol-grid');
  const config = getLayoutConfig(activeLayout);
  
  if(!photos.length) {
    if(mobGrid) mobGrid.innerHTML = `<div class="empty-st"><div class="ei">📷</div><p>your shots<br>will appear<br>here</p></div>`;
    if(deskGrid) deskGrid.innerHTML = `<div class="desk-empty"><div class="ei">📷</div><p>your shots<br>will appear<br>here</p></div>`;
    updateFoot();
    return;
  }
  
  const totalStrips = Math.ceil(photos.length / config.total);
  [
    { el: mobGrid, cClass: `prow c${config.c}` },
    { el: deskGrid, cClass: `prow c${config.c}` }
  ].forEach(target => {
    if(!target.el) return;
    target.el.innerHTML = '';
    
    for(let s=0; s<totalStrips; s++) {
      const stripItem = document.createElement('div');
      stripItem.className = 'film-strip-item';
      
      const gridRow = document.createElement('div');
      gridRow.className = target.cClass;
      
      for(let f=0; f<config.total; f++) {
        const pIdx = s * config.total + f;
        if(pIdx < photos.length) {
          const item = photos[pIdx];
          const frameWrap = document.createElement('div');
          frameWrap.className = 'strip-frame-wrap';
          frameWrap.innerHTML = `<img src="${item.src}" class="strip-img" alt="strip">`;
          gridRow.appendChild(frameWrap);
        }
      }
      stripItem.appendChild(gridRow);
      
      const metaRow = document.createElement('div');
      metaRow.className = 'strip-meta';
      metaRow.innerHTML = `<div class="strip-info"><span>STRIP #${totalStrips - s}</span></div>
                           <div class="strip-acts">
                             <button class="strip-btn" onclick="deleteOne(${photos[s*config.total]?.id})">✕</button>
                           </div>`;
      stripItem.appendChild(metaRow);
      target.el.appendChild(stripItem);
    }
  });
  updateFoot();
}

function updateFoot() {
  ['mob-clear-btn','desk-clear-btn'].forEach(id => { const el = $(id); if(el) el.disabled = !photos.length; });
  ['mob-dl-btn','desk-dl-btn'].forEach(id => { const el = $(id); if(el) el.disabled = !photos.length; });
}

function deleteOne(id) {
  photos = photos.filter(p => p.id !== id);
  updateCounters(); rebuildGrids();
}

function clearAll() {
  if(!photos.length) return;
  photos = []; updateCounters(); rebuildGrids();
  showToast('roll cleared');
}

function toggleSheet() {
  const sheet = $('roll-sheet'); if(sheet) sheet.classList.toggle('open');
}

function downloadAll() {
  if(!photos.length) return;
  const config = getLayoutConfig(activeLayout);
  const totalPhotos = Math.min(photos.length, config.total);
  const sub = photos.slice(0, totalPhotos);
  
  // Render output exactly matching a 1080x1080 pixel square layout specifications
  const cW = 1080;
  const cH = 1080;
  const padding = 40;
  const spacing = 32;
  const topBar = 80;
  const bottomBar = 120;
  
  const sW = cW + (padding * 2);
  const sH = (cH * totalPhotos) + (spacing * (totalPhotos - 1)) + padding + topBar + bottomBar;
  
  const sheet = document.createElement('canvas');
  sheet.width = sW; sheet.height = sH;
  const ctx = sheet.getContext('2d');
  
  ctx.fillStyle = '#11110f'; ctx.fillRect(0, 0, sW, sH);
  
  // Film perforation slots configuration
  ctx.fillStyle = '#000000';
  for(let y=12; y<sH; y+=24) {
    ctx.beginPath(); ctx.arc(14, y, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sW - 14, y, 6, 0, Math.PI*2); ctx.fill();
  }
  
  // Header Info
  ctx.fillStyle = '#c07810'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center';
  ctx.fillText('✦ DARKROOM PHOTOBOOTH ✦', sW/2, 45);
  
  for(let i=0; i<totalPhotos; i++) {
    const img = new Image();
    img.src = sub[i].src;
    const x = padding;
    const y = padding + topBar + (i * (cH + spacing));
    
    // Core square framing background render
    ctx.fillStyle = '#000000';
    ctx.fillRect(x - 6, y - 6, cW + 12, cH + 12);
    ctx.drawImage(img, x, y, cW, cH);
    
    // Core info tags alignment overlay
    ctx.fillStyle = '#8a7060'; ctx.font = '14px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`FN-${String(totalPhotos - i).padStart(2,'0')}`, x + 6, y + cH + 20);
    ctx.textAlign = 'right';
    ctx.fillText(`${sub[i].filter} // ${sub[i].ts}`, x + cW - 6, y + cH + 20);
  }
  
  ctx.fillStyle = '#4a4540'; ctx.font = 'italic 13px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText('made by @hustino.28  ✦  darkroom photobooth', sW/2, sH - 30);
  
  const a = document.createElement('a');
  a.href = sheet.toDataURL('image/jpeg', 0.95);
  a.download = `darkroom_strip_${Date.now()}.jpg`; a.click();
  showToast('strip downloaded ✦');
}

window.onload = () => {
  buildFiltersUI();
  startCamera();
};
</script>
