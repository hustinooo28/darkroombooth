<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>darkroom — photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ===== DUAL THEME ENGINE ===== */
[data-theme="dark"]{
  --bg:#0c0b09; --surface:#131210; --surface2:#1c1a17; --border:#2d2a24;
  --text:#e6ddd0; --text-dim:#7a7060; --text-muted:#4e4840;
  --amber:#e0981c; --amber-bg:rgba(224,152,28,.12); --amber-glow:rgba(224,152,28,.22);
  --pol-paper:#1e1b17; --pol-border:#3a332b;
  --pol-shadow:0 8px 24px rgba(0,0,0,.65),0 1px 3px rgba(0,0,0,.4);
  --pol-hover:0 18px 36px rgba(0,0,0,.8),0 4px 12px rgba(0,0,0,.3);
  --meta-col:#8a7a68; --act-border:#5e5448;
  --grain-op:.2; --vig:transparent;
  --vf-bg:#030201; --sheet-bg:rgba(18,16,14,.98); --scrollbar:#2d2a24;
  --overlay-btn:rgba(0,0,0,.7); --overlay-btn-border:rgba(255,255,255,.12);
  --toast-bg:#e6ddd0; --toast-text:#0c0b09;
}
[data-theme="light"]{
  --bg:#f5f0e8; --surface:#fefaf4; --surface2:#f2ede4; --border:#e2d8cd;
  --text:#231f1a; --text-dim:#6e6256; --text-muted:#a49484;
  --amber:#c07810; --amber-bg:rgba(192,120,16,.12); --amber-glow:rgba(192,120,16,.2);
  --pol-paper:#fffef9; --pol-border:#ede5d8;
  --pol-shadow:0 6px 18px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.06);
  --pol-hover:0 16px 32px rgba(0,0,0,.15),0 2px 6px rgba(0,0,0,.08);
  --meta-col:#9b8a74; --act-border:#d6cbbc;
  --grain-op:.12; --vig:radial-gradient(ellipse at center,transparent 55%,rgba(170,150,125,.2) 100%);
  --vf-bg:#e2d8cd; --sheet-bg:rgba(250,245,238,.98); --scrollbar:#d4cabc;
  --overlay-btn:rgba(0,0,0,.5); --overlay-btn-border:rgba(255,255,255,.2);
  --toast-bg:#231f1a; --toast-text:#fefaf4;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:var(--grain-op);mix-blend-mode:multiply;pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:var(--vig);
}
.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;min-height:48px;border-bottom:1px solid var(--border);background:var(--surface);position:relative;z-index:100;flex-shrink:0;}
.logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--amber);display:flex;align-items:baseline;gap:6px;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);font-style:italic;}
.hdr-right{display:flex;gap:6px;align-items:center;}
.pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:100px;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap;}
.pill.live{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);display:flex;align-items:center;gap:4px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--amber);color:var(--amber);}

/* polaroid */
.pol{background:var(--pol-paper);padding:7px 7px 34px;box-shadow:var(--pol-shadow);position:relative;flex-shrink:0;animation:slideUp .28s ease forwards;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px) rotate(var(--tilt,0deg))}to{opacity:1;transform:translateY(0) rotate(var(--tilt,0deg))}}
.pol-img{width:100%;display:block;border:1px solid var(--pol-border);object-fit:cover;}
.pol-foot{position:absolute;bottom:0;left:0;right:0;padding:0 7px 5px;display:flex;justify-content:space-between;align-items:flex-end;}
.p-meta{font-family:'DM Mono',monospace;font-size:7px;color:var(--meta-col);line-height:1.6;}
.p-acts{display:flex;gap:3px;}
.p-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--act-border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--meta-col);transition:all .15s;}
.p-btn:active{background:var(--bg);border-color:var(--amber);color:var(--amber);}
.prow{display:grid;gap:7px;}
.prow.c2{grid-template-columns:repeat(2,1fr);}
.prow.c3{grid-template-columns:repeat(3,1fr);}
.prow.c4{grid-template-columns:repeat(4,1fr);}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--toast-bg);color:var(--toast-text);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.07em;padding:8px 18px;border-radius:100px;z-index:10000;transition:transform .25s ease;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ========= MOBILE LAYOUT (PRESERVATION + HCI REFINEMENT) ========= */
.vf-panel{flex:1;position:relative;overflow:hidden;background:var(--vf-bg);min-height:0;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}
#video.mirrored{transform:scaleX(-1);}
.vf-overlay{position:absolute;inset:0;pointer-events:none;}
.corner{position:absolute;width:18px;height:18px;border-color:var(--amber);border-style:solid;opacity:.6;}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;}
.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;}
.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;}
.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;}
.flash-el{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .04s;}
.flash-el.on{opacity:1;}
.cd-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Serif Display',serif;font-size:88px;color:#fff;text-shadow:0 4px 28px rgba(0,0,0,.75);opacity:0;transition:opacity .18s;z-index:10;line-height:1;}
.cd-num.show{opacity:1;}
.vf-tag{position:absolute;bottom:10px;left:10px;font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:.14em;text-transform:uppercase;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:2px;border:1px solid rgba(180,110,10,.4);pointer-events:none;}
.no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--vf-bg);}
.no-cam svg{opacity:.25;stroke:var(--text-dim);}
.no-cam-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}
.no-cam-btn{padding:11px 28px;background:var(--amber);border:none;border-radius:7px;color:#fff;font-family:'DM Serif Display',serif;font-size:16px;cursor:pointer;transition:all .15s;}
.no-cam-btn:active{transform:scale(.95);}
.vf-controls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:20;}
.vf-ctrl-btn{width:34px;height:34px;border-radius:50%;background:var(--overlay-btn);border:1px solid var(--overlay-btn-border);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:all .15s;}
.vf-ctrl-btn:active{transform:scale(.88);}
.vf-cam-row{position:absolute;bottom:10px;right:10px;display:flex;gap:4px;z-index:20;}
.vf-cam-btn{font-family:'DM Mono',monospace;font-size:9px;padding:5px 8px;border-radius:4px;background:var(--overlay-btn);border:1px solid var(--overlay-btn-border);color:rgba(255,255,255,.9);cursor:pointer;backdrop-filter:blur(4px);transition:all .15s;}
.vf-cam-btn:active{transform:scale(.9);}
.vf-cam-btn.active{border-color:var(--amber);color:var(--amber);}
.bottom-bar{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);position:relative;z-index:50;}
.filter-strip{display:flex;overflow-x:auto;padding:7px 10px;border-bottom:1px solid var(--border);gap:4px;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.fchip{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 7px;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:all .15s;flex-shrink:0;}
.fchip:active{transform:scale(.92);}
.fchip.active{background:var(--amber-bg);border-color:var(--amber);}
.fthumb{width:32px;height:22px;border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.fthumb-inner{width:100%;height:100%;background:linear-gradient(135deg,#c8b090,#907060,#604030);}
.fchip-name{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);}
.fchip.active .fchip-name{color:var(--amber);}
.shoot-row{display:flex;align-items:center;gap:8px;padding:9px 14px calc(9px + env(safe-area-inset-bottom,0px));}
.timer-sel{font-family:'DM Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 8px;border-radius:5px;cursor:pointer;flex:1;}
.mob-shoot-btn{padding:10px 22px;background:var(--amber);border:none;border-radius:7px;color:#fff;font-family:'DM Serif Display',serif;font-size:16px;cursor:pointer;transition:all .15s;flex-shrink:0;}
.mob-shoot-btn:active{transform:scale(.94);}
.mob-shoot-btn:disabled{opacity:.3;cursor:not-allowed;}
.roll-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--sheet-bg);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;border-top:1px solid var(--border);z-index:200;transform:translateY(calc(100% - 52px));transition:transform .32s cubic-bezier(.2,.9,.4,1.1);max-height:85dvh;display:flex;flex-direction:column;overflow:hidden;}
.roll-sheet.open{transform:translateY(0);}
.sheet-handle{flex-shrink:0;padding:10px 16px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;user-select:none;}
.handle-bar{width:36px;height:4px;border-radius:2px;background:var(--border);}
.sheet-header{width:100%;display:flex;align-items:center;justify-content:space-between;}
.shot-ctr{font-family:'DM Serif Display',serif;font-size:19px;color:var(--amber);line-height:1;}
.shot-ctr small{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-left:2px;}
.layout-picker{display:flex;gap:3px;flex-wrap:wrap;}
.lp-btn{font-family:'DM Mono',monospace;font-size:9px;padding:4px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.lp-btn:active{transform:scale(.9);}
.lp-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.pol-grid{flex:1;padding:10px 14px 6px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:28px 0;}
.empty-st .ei{font-size:26px;opacity:.2;}
.empty-st p{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;}
.roll-foot{padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);display:flex;gap:6px;background:var(--surface);flex-shrink:0;}
.ft-btn{flex:1;padding:10px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;}
.ft-btn:active{transform:scale(.96);}
.ft-btn.pri{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
.ft-btn:disabled{opacity:.28;cursor:not-allowed;}

/* ========= DESKTOP LAYOUT (FULLY PRESERVED) ========= */
@media(min-width:769px){
  .bottom-bar,.roll-sheet,.vf-controls,.vf-cam-row,.no-cam .no-cam-btn{display:none!important;}
  .toast{bottom:28px;}
  .app{height:100vh;display:grid;grid-template-rows:52px 1fr 34px;}
  header{height:52px;padding:0 24px;}
  .logo{font-size:19px;}
  .desk-main{display:grid;grid-template-columns:256px 1fr 320px;overflow:hidden;}
  .desk-sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden;}
  .sb-block{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px;flex-shrink:0;}
  .sb-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.18em;text-transform:uppercase;}
  .desk-cam-sw{display:flex;gap:3px;}
  .desk-cam-btn{flex:1;font-family:'DM Mono',monospace;font-size:10px;padding:6px 4px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;text-align:center;}
  .desk-cam-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
  .mirror-row{display:flex;align-items:center;justify-content:space-between;}
  .toggle-track{width:34px;height:19px;border-radius:10px;background:var(--border);cursor:pointer;position:relative;border:none;}
  .toggle-track.on{background:var(--amber);}
  .toggle-thumb{position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;}
  .toggle-track.on .toggle-thumb{left:18px;}
  .toggle-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
  .desk-filter-list{flex:1;overflow-y:auto;padding:7px 10px;display:flex;flex-direction:column;gap:3px;}
  .desk-fchip{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent;}
  .desk-fchip.active{background:var(--amber-bg);border-color:var(--amber);}
  .desk-fthumb{width:36px;height:26px;border-radius:3px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);}
  .desk-fchip-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
  .desk-fchip.active .desk-fchip-name{color:var(--amber);}
  .desk-shoot-section{padding:11px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
  .desk-timer{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;cursor:pointer;}
  .desk-shoot-btn{width:100%;padding:12px;background:var(--amber);border:none;border-radius:6px;color:#fff;font-family:'DM Serif Display',serif;font-size:16px;cursor:pointer;}
  .desk-shoot-btn:disabled{opacity:.32;}
  .desk-allow-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--amber);border-radius:5px;color:var(--amber);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;}
  .desk-vf{display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);position:relative;}
  .desk-vf-wrap{position:relative;width:100%;max-width:640px;background:var(--vf-bg);border-radius:8px;overflow:hidden;border:1px solid var(--border);aspect-ratio:4/3;}
  .desk-vf-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
  .desk-vf-wrap video.mirrored{transform:scaleX(-1);}
  .desk-no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--vf-bg);}
  .desk-flash{position:absolute;inset:0;background:#fff;opacity:0;transition:opacity .04s;pointer-events:none;}
  .desk-flash.on{opacity:1;}
  .desk-cdnum{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Serif Display',serif;font-size:88px;color:#fff;text-shadow:0 4px 28px rgba(0,0,0,.75);opacity:0;transition:opacity .18s;}
  .desk-cdnum.show{opacity:1;}
  .desk-vf-tag{position:absolute;bottom:10px;left:10px;font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);background:rgba(0,0,0,.55);padding:3px 7px;border-radius:2px;}
  .desk-roll{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);overflow:hidden;}
  .desk-roll-hdr{padding:11px 14px 9px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .desk-shot-ctr{font-family:'DM Serif Display',serif;font-size:24px;color:var(--amber);}
  .desk-layout-picker{display:flex;gap:3px;flex-wrap:wrap;}
  .desk-lp-btn{font-family:'DM Mono',monospace;font-size:9px;padding:4px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;}
  .desk-lp-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
  .desk-pol-grid{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
  .desk-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
  .desk-roll-foot{padding:9px 12px;border-top:1px solid var(--border);display:flex;gap:6px;}
  .desk-ft-btn{flex:1;padding:9px 6px;font-family:'DM Mono',monospace;font-size:9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;}
  .desk-ft-btn.pri{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
  footer{display:flex;align-items:center;justify-content:center;border-top:1px solid var(--border);background:var(--bg);height:34px;}
  .foot-txt{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);display:flex;gap:7px;}
  .vf-panel,.bottom-bar,.roll-sheet{display:none!important;}
}
.desk-main, .desk-sidebar, .desk-vf, .desk-roll, footer{display:none;}
@media(min-width:769px){ .desk-main{display:grid;} .desk-sidebar,.desk-vf,.desk-roll{display:flex;} footer{display:flex;} }
</style>
</head>
<body>
<div class="app">
  <header><div class="logo">darkroom <span class="logo-sub">photobooth</span></div>
    <div class="hdr-right"><div class="pill live"><div class="live-dot"></div><span id="status-text">idle</span></div>
    <button class="icon-btn" id="mirror-btn" onclick="window.toggleMirror?.()">⇆</button>
    <button class="icon-btn" id="theme-btn" onclick="window.toggleTheme?.()">☀</button></div>
  </header>

  <!-- MOBILE VIEWFINDER PRIMARY -->
  <div class="vf-panel"><video id="video" autoplay playsinline muted></video><canvas id="canvas"></canvas>
    <div class="vf-overlay"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div></div>
    <div class="flash-el" id="flash"></div><div class="cd-num" id="cdnum"></div><div class="vf-tag" id="vf-tag">RAW</div>
    <div class="vf-cam-row"><button class="vf-cam-btn active" id="mob-btn-rear" data-cam="environment">rear</button><button class="vf-cam-btn" id="mob-btn-front" data-cam="user">front</button></div>
    <div class="vf-controls"><button class="vf-ctrl-btn" id="mob-mirror-btn">⇆</button></div>
    <div class="no-cam" id="no-cam"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span class="no-cam-label">camera offline</span><button class="no-cam-btn" onclick="startCamera()">allow camera</button></div>
  </div>

  <!-- MOBILE BOTTOM CONTROLS -->
  <div class="bottom-bar"><div class="filter-strip" id="mob-filter-list"></div>
    <div class="shoot-row"><select class="timer-sel" id="mob-timer"><option value="0">now</option><option value="3">3 s</option><option value="5">5 s</option><option value="10">10 s</option></select><button class="mob-shoot-btn" id="mob-shoot-btn" disabled>shoot</button></div>
  </div>

  <!-- MOBILE GALLERY DRAWER (progressive disclosure) -->
  <div class="roll-sheet" id="roll-sheet"><div class="sheet-handle" id="sheet-handle"><div class="handle-bar"></div><div class="sheet-header"><div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);">roll</div><div class="shot-ctr" id="mob-shot-ctr">0 <small>shots</small></div></div><div><div class="layout-picker" id="mob-layout-picker"><button class="lp-btn active" data-l="1x1">1×1</button><button class="lp-btn" data-l="1x2">1×2</button><button class="lp-btn" data-l="1x4">1×4</button><button class="lp-btn" data-l="2x2">2×2</button><button class="lp-btn" data-l="2x3">2×3</button><button class="lp-btn" data-l="3x3">3×3</button></div></div></div></div>
    <div class="pol-grid" id="mob-pol-grid"><div class="empty-st"><div class="ei">📷</div><p>your shots<br>will appear<br>here</p></div></div>
    <div class="roll-foot"><button class="ft-btn" id="mob-clear-btn">clear</button><button class="ft-btn pri" id="mob-dl-btn">download</button></div>
  </div>

  <!-- DESKTOP LAYOUT (PRESERVED FULL) -->
  <div class="desk-main"><div class="desk-sidebar"><div class="sb-block"><div class="sb-label">camera</div><div class="desk-cam-sw"><button class="desk-cam-btn active" data-cam="environment">rear</button><button class="desk-cam-btn" data-cam="user">front</button></div><div class="mirror-row"><span class="toggle-lbl">mirror preview</span><div class="toggle-track" id="desk-mirror-toggle"><div class="toggle-thumb"></div></div></div></div><div class="sb-label" style="padding:0 14px 4px">filters</div><div class="desk-filter-list" id="desk-filter-list"></div><div class="desk-shoot-section"><select class="desk-timer" id="desk-timer"><option value="0">now</option><option value="3">3 sec</option><option value="5">5 sec</option><option value="10">10 sec</option></select><button class="desk-shoot-btn" id="desk-shoot-btn">shoot</button><button class="desk-allow-btn" id="desk-allow-btn">allow camera</button></div></div>
    <div class="desk-vf"><div class="desk-vf-wrap"><video id="desk-video" autoplay playsinline muted></video><div class="desk-flash" id="desk-flash"></div><div class="desk-cdnum" id="desk-cdnum"></div><div class="desk-vf-tag" id="desk-vf-tag">RAW</div><div class="desk-no-cam" id="desk-no-cam" style="display:none"><span>🔴 camera inactive</span></div></div></div>
    <div class="desk-roll"><div class="desk-roll-hdr"><div class="desk-shot-ctr" id="desk-shot-ctr">0 <small>exposures</small></div><div class="desk-layout-picker" id="desk-layout-picker"><button class="desk-lp-btn active" data-l="1x1">1×1</button><button class="desk-lp-btn" data-l="1x2">1×2</button><button class="desk-lp-btn" data-l="1x4">1×4</button><button class="desk-lp-btn" data-l="2x2">2×2</button><button class="desk-lp-btn" data-l="2x3">2×3</button><button class="desk-lp-btn" data-l="3x3">3×3</button></div></div><div class="desk-pol-grid" id="desk-pol-grid"><div class="desk-empty"><div class="ei">🎞️</div><p>empty roll</p></div></div><div class="desk-roll-foot"><button class="desk-ft-btn" id="desk-clear-btn">clear roll</button><button class="desk-ft-btn pri" id="desk-dl-btn">download all</button></div></div>
  </div>
  <footer><div class="foot-txt"><span>darkroom</span><span class="foot-handle">◉</span><span>film simulation</span></div></footer>
</div>
<script>
// FULL ASSET ENGINE, LAYOUTS, FILTERS, CAMERA SYSTEMS. PRESERVED.
const FILTERS = {RAW:null,Kodak:'sepia(0.4) contrast(1.1) brightness(1.02)',Ilford:'grayscale(1) contrast(1.25)',Lomo:'brightness(1.08) contrast(1.12) saturate(1.3)',Fade:'saturate(0.8) brightness(1.05)',Warm:'sepia(0.25) saturate(1.2) brightness(1.03)',Cool:'hue-rotate(15deg) saturate(1.1)',Velvia:'saturate(1.7) contrast(1.15)'};
let currentFilter='RAW', photos=[], stream=null, currentFacing='environment', mirrorEnabled=false, activeTimer=0, countdownInterval=null, layout='1x1';
const videoElem=document.getElementById('video'), canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
const deskVideo=document.getElementById('desk-video'), deskCanvas=document.createElement('canvas');
function setFilter(f){currentFilter=f;document.getElementById('vf-tag')&&(document.getElementById('vf-tag').innerText=f);document.getElementById('desk-vf-tag')&&(document.getElementById('desk-vf-tag').innerText=f);updateFilterUI();}
function applyFilterToCanvas(ctx,w,h){if(currentFilter!=='RAW'&&FILTERS[currentFilter])ctx.filter=FILTERS[currentFilter];else ctx.filter='none';}
async function startCamera(face=currentFacing){try{if(stream)stream.getTracks().forEach(t=>t.stop());const constraints={video:{facingMode:{exact:face},width:{ideal:1920},height:{ideal:1080}}};stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});videoElem.srcObject=stream;deskVideo.srcObject=stream;await videoElem.play();await deskVideo.play();document.getElementById('status-text').innerText='live';document.getElementById('no-cam').style.display='none';document.getElementById('desk-no-cam').style.display='none';document.getElementById('mob-shoot-btn').disabled=false;document.getElementById('desk-shoot-btn').disabled=false;}catch(e){document.getElementById('status-text').innerText='offline';document.getElementById('no-cam').style.display='flex';document.getElementById('desk-no-cam').style.display='flex';document.getElementById('mob-shoot-btn').disabled=true;document.getElementById('desk-shoot-btn').disabled=true;}}
function switchCam(face){currentFacing=face;startCamera(face);document.querySelectorAll('.vf-cam-btn').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-cam')===face));document.querySelectorAll('.desk-cam-btn').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-cam')===face));}
function toggleMirror(){mirrorEnabled=!mirrorEnabled;videoElem.classList.toggle('mirrored',mirrorEnabled);deskVideo.classList.toggle('mirrored',mirrorEnabled);document.getElementById('mirror-btn')&&document.getElementById('mirror-btn').classList.toggle('on',mirrorEnabled);}
async function capturePhoto(){if(activeTimer)return;const timerVal=parseInt(document.getElementById('mob-timer')?.value||document.getElementById('desk-timer')?.value||0);if(timerVal>0){activeTimer=timerVal;let numDiv=document.getElementById('cdnum'), deskNum=document.getElementById('desk-cdnum');function updateCount(val){if(numDiv){numDiv.innerText=val;numDiv.classList.add('show');setTimeout(()=>numDiv.classList.remove('show'),150);}if(deskNum){deskNum.innerText=val;deskNum.classList.add('show');setTimeout(()=>deskNum.classList.remove('show'),150);}}updateCount(timerVal);countdownInterval=setInterval(()=>{activeTimer--;if(activeTimer<=0){clearInterval(countdownInterval);countdownInterval=null;activeTimer=0;executeCapture();}else updateCount(activeTimer);},1000);}else executeCapture();}
function executeCapture(){const sourceVideo=videoElem.srcObject?videoElem:deskVideo.srcObject?deskVideo:null;if(!sourceVideo||!sourceVideo.videoWidth)return;const w=sourceVideo.videoWidth,h=sourceVideo.videoHeight;canvas.width=w;canvas.height=h;ctx.drawImage(sourceVideo,0,0,w,h);applyFilterToCanvas(ctx,w,h);ctx.drawImage(sourceVideo,0,0,w,h);const imgData=canvas.toDataURL('image/png');photos.push({data:imgData,filter:currentFilter,timestamp:Date.now()});updateGallery();flashEffect();if(currentFilter!=='RAW')setFilter(currentFilter);saveToLocal();}
function flashEffect(){const fl=document.getElementById('flash'), dfl=document.getElementById('desk-flash');if(fl){fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),80);}if(dfl){dfl.classList.add('on');setTimeout(()=>dfl.classList.remove('on'),80);}}
function setLayout(l,ev){layout=l;document.querySelectorAll('.lp-btn, .desk-lp-btn').forEach(btn=>btn.classList.remove('active'));if(ev)ev.currentTarget.classList.add('active');else document.querySelector(`.lp-btn[data-l="${l}"]`)?.classList.add('active');updateGallery();}
function updateGallery(){const mobGrid=document.getElementById('mob-pol-grid');const deskGrid=document.getElementById('desk-pol-grid');if(!mobGrid)return;if(photos.length===0){const emptyHtml=`<div class="empty-st"><div class="ei">📷</div><p>your shots<br>will appear<br>here</p></div>`;mobGrid.innerHTML=emptyHtml;deskGrid.innerHTML=`<div class="desk-empty"><div class="ei">🎞️</div><p>empty roll</p></div>`;}else{const layoutMap={ '1x1':{cols:1,rows:1},'1x2':{cols:1,rows:2},'1x4':{cols:1,rows:4},'2x2':{cols:2,rows:2},'2x3':{cols:2,rows:3},'3x3':{cols:3,rows:3}};const cells=layoutMap[layout]?.cols*layoutMap[layout]?.rows||1;let groups=[];for(let i=0;i<photos.length;i+=cells)groups.push(photos.slice(i,i+cells));const buildGroup=(group,idx)=>`<div class="pol" style="--tilt:${(Math.random()*0.6-0.3).toFixed(1)}deg"><div class="prow c${layoutMap[layout]?.cols||1}">${group.map(p=>`<div><img class="pol-img" src="${p.data}" loading="lazy"><div class="pol-foot"><span class="p-meta">${new Date(p.timestamp).toLocaleTimeString().slice(0,5)}<br>${p.filter}</span><div class="p-acts"><button class="p-btn" onclick="deletePhoto(${idx* layoutMap[layout]?.cols*layoutMap[layout]?.rows + group.indexOf(p)})">⌫</button></div></div></div>`).join('')}</div></div>`;mobGrid.innerHTML=groups.map((g,i)=>buildGroup(g,i)).join('');deskGrid.innerHTML=groups.map((g,i)=>buildGroup(g,i)).join('');}document.getElementById('mob-shot-ctr').innerHTML=`${photos.length} <small>shots</small>`;document.getElementById('desk-shot-ctr').innerHTML=`${photos.length} <small>exposures</small>`;document.getElementById('mob-clear-btn').disabled=photos.length===0;document.getElementById('mob-dl-btn').disabled=photos.length===0;document.getElementById('desk-clear-btn').disabled=photos.length===0;document.getElementById('desk-dl-btn').disabled=photos.length===0;}
function deletePhoto(idx){photos.splice(idx,1);updateGallery();saveToLocal();}
function clearAll(){if(confirm('erase entire roll?')){photos=[];updateGallery();saveToLocal();}}
function downloadAll(){if(photos.length===0)return;const zip=photos.map((p,i)=>`<a download="darkroom_${i+1}.png" href="${p.data}">`);const blob=new Blob(zip,{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='darkroom_roll.html';a.click();URL.revokeObjectURL(a.href);showToast('roll exported');}
function showToast(msg){let t=document.querySelector('.toast');if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function saveToLocal(){localStorage.setItem('darkroom_photos',JSON.stringify(photos));localStorage.setItem('darkroom_layout',layout);}
function loadFromLocal(){const saved=localStorage.getItem('darkroom_photos');if(saved)photos=JSON.parse(saved);const savedLayout=localStorage.getItem('darkroom_layout');if(savedLayout){layout=savedLayout;document.querySelectorAll('.lp-btn, .desk-lp-btn').forEach(btn=>btn.classList.remove('active'));document.querySelector(`.lp-btn[data-l="${layout}"]`)?.classList.add('active');document.querySelector(`.desk-lp-btn[data-l="${layout}"]`)?.classList.add('active');}updateGallery();}
function toggleTheme(){const html=document.documentElement;const newTheme=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',newTheme);localStorage.setItem('darkroom_theme',newTheme);const btn=document.getElementById('theme-btn');if(btn)btn.innerText=newTheme==='dark'?'☀':'🌙';}
function initTheme(){const stored=localStorage.getItem('darkroom_theme');const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;const theme=stored||(prefersDark?'dark':'light');document.documentElement.setAttribute('data-theme',theme);document.getElementById('theme-btn').innerText=theme==='dark'?'☀':'🌙';}
function updateFilterUI(){document.querySelectorAll('.fchip, .desk-fchip').forEach(el=>el.classList.remove('active'));document.querySelectorAll(`.fchip[data-f="${currentFilter}"], .desk-fchip[data-f="${currentFilter}"]`).forEach(el=>el.classList.add('active'));}
function buildFilterList(){const container=document.getElementById('mob-filter-list');const deskContainer=document.getElementById('desk-filter-list');if(!container)return;container.innerHTML='';deskContainer.innerHTML='';Object.keys(FILTERS).forEach(f=>{const btn=document.createElement('div');btn.className='fchip';btn.setAttribute('data-f',f);btn.innerHTML=`<div class="fthumb"><div class="fthumb-inner" style="filter:${FILTERS[f]||'none'}"></div></div><span class="fchip-name">${f}</span>`;btn.onclick=()=>setFilter(f);container.appendChild(btn);const deskBtn=document.createElement('div');deskBtn.className='desk-fchip';deskBtn.setAttribute('data-f',f);deskBtn.innerHTML=`<div class="desk-fthumb"><div class="desk-fthumb-inner" style="filter:${FILTERS[f]||'none'}"></div></div><span class="desk-fchip-name">${f}</span>`;deskBtn.onclick=()=>setFilter(f);deskContainer.appendChild(deskBtn);});}
window.toggleSheet=()=>{document.getElementById('roll-sheet').classList.toggle('open');};
window.setLayout=setLayout;window.deletePhoto=deletePhoto;window.clearAll=clearAll;window.downloadAll=downloadAll;window.toggleMirror=toggleMirror;window.switchCam=switchCam;window.capturePhoto=capturePhoto;window.startCamera=startCamera;window.toggleTheme=toggleTheme;
document.getElementById('mob-shoot-btn')?.addEventListener('click',capturePhoto);document.getElementById('desk-shoot-btn')?.addEventListener('click',capturePhoto);document.getElementById('mob-clear-btn')?.addEventListener('click',clearAll);document.getElementById('mob-dl-btn')?.addEventListener('click',downloadAll);document.getElementById('desk-clear-btn')?.addEventListener('click',clearAll);document.getElementById('desk-dl-btn')?.addEventListener('click',downloadAll);document.getElementById('sheet-handle')?.addEventListener('click',()=>document.getElementById('roll-sheet').classList.toggle('open'));document.getElementById('mob-mirror-btn')?.addEventListener('click',toggleMirror);document.getElementById('desk-mirror-toggle')?.addEventListener('click',toggleMirror);document.querySelectorAll('.vf-cam-btn').forEach(btn=>btn.addEventListener('click',()=>switchCam(btn.getAttribute('data-cam'))));document.querySelectorAll('.desk-cam-btn').forEach(btn=>btn.addEventListener('click',()=>switchCam(btn.getAttribute('data-cam'))));document.getElementById('desk-allow-btn')?.addEventListener('click',()=>startCamera(currentFacing));document.querySelectorAll('.lp-btn, .desk-lp-btn').forEach(btn=>btn.addEventListener('click',(e)=>{setLayout(btn.getAttribute('data-l'),e);}));
buildFilterList();initTheme();loadFromLocal();startCamera('environment');
</script>
</body>
</html>
