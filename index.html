<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>darkroom photobooth</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#E5A93C',
                            darkGold: '#C48E2C'
                        }
                    },
                    fontFamily: {
                        mono: ['Courier New', 'Courier', 'monospace'],
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif']
                    },
                    animation: {
                        'flash-shutter': 'flash 150ms ease-out forwards',
                        'slide-up': 'slideUp 300ms cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        flash: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style type="text/css">
        /* Global CSS Overrides & Custom Cross-Browser Utilities */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000000;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="h-full text-white selection:bg-brand-gold/30 selection:text-white antialiased">

    <div id="photobooth-root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function DarkroomPhotoboothApp() {
            // ========================================================
            // STATE ENGINE COEFFICIENTS
            // ========================================================
            const [stream, setStream] = useState(null);
            const [recentStrips, setRecentStrips] = useState([]);
            const [layout, setLayout] = useState('1x4'); 
            const [isGalleryOpen, setIsGalleryOpen] = useState(false);
            const [isFlashActive, setIsFlashActive] = useState(false);
            const [activeFilter, setActiveFilter] = useState('raw');
            const [cameraFacing, setCameraFacing] = useState('rear'); 
            const [isShooting, setIsShooting] = useState(false);
            const [countdown, setCountdown] = useState(null);
            const [systemStatus, setSystemStatus] = useState('INITIALIZING');

            // ========================================================
            // GRAPHICS ENGINE RESOURCE POINTERS
            // ========================================================
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            // ========================================================
            // MEDIA CAPTURE HARDWARE SUB-SYSTEM
            // ========================================================
            useEffect(() => {
                async function initializeHardware() {
                    setSystemStatus('CONNECTING_HARDWARE');
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                    try {
                        const targetConstraints = {
                            video: {
                                facingMode: cameraFacing === 'rear' ? 'environment' : 'user',
                                width: { ideal: 1920 },
                                height: { ideal: 1080 }
                            },
                            audio: false
                        };
                        const activeStream = await navigator.mediaDevices.getUserMedia(targetConstraints);
                        setStream(activeStream);
                        if (videoRef.current) {
                            videoRef.current.srcObject = activeStream;
                        }
                        setSystemStatus('READY');
                    } catch (hardwareFault) {
                        console.error("Camera Interface Initialization Failure: ", hardwareFault);
                        setSystemStatus('HARDWARE_FAULT_PERMISSIONS');
                    }
                }
                initializeHardware();

                return () => {
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            }, [cameraFacing]);

            // ========================================================
            // CANVAS BUFFER RENDER COMPILATION PIPELINE
            // ========================================================
            const triggerPhotoCaptureSequence = () => {
                if (!videoRef.current || isShooting) return;
                
                setIsShooting(true);
                setCountdown(3); // Standard 3 second booth countdown loop
                
                const timerInterval = setInterval(() => {
                    setCountdown(prev => {
                        if (prev <= 1) {
                            clearInterval(timerInterval);
                            executeShutterFlashCycle();
                            return null;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const executeShutterFlashCycle = () => {
                setIsFlashActive(true);
                
                // Dim physical screen emission layer quickly to create standard high dynamic pop frame flash
                setTimeout(() => setIsFlashActive(false), 150);

                // Run structural snapshot image compression inside separate event cycle
                setTimeout(() => {
                    try {
                        const targetCanvas = canvasRef.current;
                        const srcVideo = videoRef.current;
                        
                        if (targetCanvas && srcVideo) {
                            const ctx = targetCanvas.getContext('2d');
                            // Emulate crisp 4:3 high-res rendering box ratios
                            targetCanvas.width = 1200;
                            targetCanvas.height = 1600;
                            
                            // Clear canvas frame state layers
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
                            
                            // Mock structural strip photo grid block layers for download distribution testing
                            ctx.fillStyle = '#171717';
                            ctx.fillRect(40, 40, 1120, 340);
                            ctx.fillRect(40, 420, 1120, 340);
                            ctx.fillRect(40, 800, 1120, 340);
                            ctx.fillRect(40, 1180, 1120, 340);

                            const exportDataUrl = targetCanvas.toDataURL('image/png');
                            const uniqueSessionId = Date.now().toString();
                            
                            const photoStripInstance = {
                                id: uniqueSessionId,
                                url: exportDataUrl,
                                thumbnailUrl: exportDataUrl,
                                configLayout: layout,
                                capturedFilter: activeFilter,
                                timestamp: new Date().toLocaleTimeString()
                            };

                            setRecentStrips(prevPool => [photoStripInstance, ...prevPool]);
                        }
                    } catch (renderError) {
                        console.error("Graphics compilation fault: ", renderError);
                    } finally {
                        setIsShooting(false);
                    }
                }, 200);
            };

            const triggerAssetDownload = (targetStripAsset) => {
                if (!targetStripAsset || !targetStripAsset.url) return;
                const clientAnchor = document.createElement('a');
                clientAnchor.href = targetStripAsset.url;
                clientAnchor.download = `darkroom-strip-${targetStripAsset.id}.png`;
                document.body.appendChild(clientAnchor);
                clientAnchor.click();
                document.body.removeChild(clientAnchor);
            };

            // ========================================================
            // PHOTOBOOTH STYLING SPECIFICATIONS ARRAY
            // ========================================================
            const filterChromaPresets = [
                { id: 'raw', label: 'RAW', matrix: 'contrast-100 brightness-100' },
                { id: 'kodak', label: 'KODAK', matrix: 'contrast-125 brightness-95 sepia-[0.15] saturate-150' },
                { id: 'ilford', label: 'ILFORD', matrix: 'grayscale-100 contrast-150 brightness-90' },
                { id: 'lomo', label: 'LOMO', matrix: 'contrast-150 saturate-200 hue-rotate-15' },
                { id: 'fade', label: 'FADE', matrix: 'brightness-110 contrast-75 saturate-75' },
                { id: 'warm', label: 'WARM', matrix: 'sepia-[0.35] saturate-125 brightness-105' },
                { id: 'cool', label: 'COOL', matrix: 'hue-rotate-180 brightness-95 saturate-110' },
                { id: 'velvia', label: 'VELVIA', matrix: 'contrast-135 saturate-150 brightness-100 uppercase' }
            ];

            return (
                <div className="min-h-screen bg-black text-white flex flex-col font-sans select-none overflow-x-hidden relative">
                    
                    {/* Hidden Canvas Context Frame Processor Array Buffer */}
                    <canvas ref={canvasRef} className="hidden" />

                    {/* ========================================================
                      TOP MASTER APPLICATION BAR INTERFACE
                      ======================================================== */}
                    <header className="w-full px-4 py-3.5 flex items-center justify-between border-b border-neutral-900 bg-neutral-950/90 backdrop-blur-md z-30">
                        <div className="flex items-center gap-3">
                            <span className="text-brand-gold font-mono tracking-widest text-base uppercase font-black">
                                darkroom <span className="text-[10px] text-neutral-500 font-normal lowercase tracking-wide">photobooth</span>
                            </span>
                            <div className="hidden sm:inline-flex items-center gap-1.5 bg-neutral-900 border border-neutral-800 text-[9px] text-green-400 px-2 py-0.5 rounded font-mono uppercase tracking-wider">
                                <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                LIVE FEED
                            </div>
                        </div>

                        {/* Middle Live System Configuration Metric Badges (Desktop Context Only) */}
                        <div className="hidden lg:flex items-center gap-6 text-[11px] font-mono text-neutral-400">
                            <div>LAYOUT: <span className="text-white uppercase font-bold">{layout}</span></div>
                            <div>FILTER: <span className="text-white uppercase font-bold">{activeFilter}</span></div>
                            <div>HARDWARE STATE: <span className="text-green-400 font-bold">{systemStatus}</span></div>
                        </div>

                        <div className="flex items-center gap-2">
                            <div className="bg-neutral-900 border border-neutral-800 rounded px-2.5 py-1 text-[11px] font-mono text-brand-gold tracking-wider uppercase">
                                BACK TRIPLE CAMERA
                            </div>
                        </div>
                    </header>

                    {/* ========================================================
                      PRIMARY DESKTOP / MOBILE WORKSPACE CONTAINER
                      ======================================================== */}
                    <main className="flex-grow flex flex-col lg:flex-row max-w-7xl w-full mx-auto p-2 sm:p-4 lg:p-6 gap-6 items-stretch justify-center h-[calc(100vh-60px)]">
                        
                        {/* VIEWPORT GRID CORE MODULE BLOCK */}
                        <div className="flex-grow flex flex-col justify-center items-center relative w-full max-w-xl mx-auto h-full">
                            
                            {/* CAMERA CORE INTERFACE WRAPPER BOX */}
                            <div className="relative w-full aspect-[3/4] bg-neutral-950 rounded-2xl overflow-hidden border border-neutral-900 shadow-2xl flex items-center justify-center">
                                
                                {/* Dynamic Media Stream Hook Output Rendering Window */}
                                <video
                                    ref={videoRef}
                                    autoPlay
                                    playsInline
                                    muted
                                    className={`w-full h-full object-cover transition-all duration-300 ${
                                        filterChromaPresets.find(f => f.id === activeFilter)?.matrix || ''
                                    }`}
                                    style={{ transform: cameraFacing === 'front' ? 'scaleX(-1)' : 'none' }}
                                />

                                {/* Countdown Text Overlay Matrix */}
                                {countdown !== null && (
                                    <div className="absolute inset-0 z-40 bg-black/40 backdrop-blur-xs flex items-center justify-center pointer-events-none animate-pulse">
                                        <span className="text-brand-gold font-mono text-8xl font-black">{countdown}</span>
                                    </div>
                                )}

                                {/* UI Framing Reticles Graphics Overlays */}
                                <div className="absolute top-4 left-4 w-4 h-4 border-t-2 border-l-2 border-brand-gold/40 pointer-events-none" />
                                <div className="absolute top-4 right-4 w-4 h-4 border-t-2 border-r-2 border-brand-gold/40 pointer-events-none" />
                                <div className="absolute bottom-4 left-4 w-4 h-4 border-b-2 border-l-2 border-brand-gold/40 pointer-events-none" />
                                <div className="absolute bottom-4 right-4 w-4 h-4 border-b-2 border-r-2 border-brand-gold/40 pointer-events-none" />

                                {/* White Shutter Mask Emissive Exposure Block */}
                                <div className={`absolute inset-0 bg-white z-50 transition-opacity duration-150 pointer-events-none ${isFlashActive ? 'opacity-100' : 'opacity-0'}`} />

                                {/* Desktop Viewport Base Metadata Overlay */}
                                <div className="hidden lg:block absolute bottom-4 left-4 bg-neutral-950/80 backdrop-blur border border-neutral-800 px-2 py-0.5 rounded text-[10px] text-neutral-400 font-mono tracking-wider">
                                    RAW
                                </div>

                                {/* Desktop Dynamic Lens Reversal Hardware Routing Interface */}
                                <div className="hidden lg:flex absolute top-4 right-4 bg-black/60 backdrop-blur-md p-1 rounded border border-neutral-800 text-[10px] uppercase font-mono text-neutral-400 gap-1 z-20">
                                    <button 
                                        onClick={() => setCameraFacing('rear')}
                                        className={`px-2 py-0.5 rounded font-bold tracking-wide transition ${cameraFacing === 'rear' ? 'bg-brand-gold text-black' : 'hover:text-white'}`}
                                    >
                                        Rear
                                    </button>
                                    <button 
                                        onClick={() => setCameraFacing('front')}
                                        className={`px-2 py-0.5 rounded font-bold tracking-wide transition ${cameraFacing === 'front' ? 'bg-brand-gold text-black' : 'hover:text-white'}`}
                                    >
                                        Front
                                    </button>
                                </div>

                                {/* ========================================================
                                  NEW PATCH: MOBILE VIEWPORT INTERACTION SYSTEM INJECTIONS
                                  ======================================================== */}
                                
                                {/* 1. FLOATING STRIP LAYOUT SELECTOR (Mobile Viewfinder Inject Only) */}
                                <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex items-center gap-1 bg-black/70 backdrop-blur-md p-1 rounded border border-neutral-800 text-[10px] uppercase tracking-wider text-neutral-400 lg:hidden z-20">
                                    <button 
                                        onClick={() => setLayout('1x4')} 
                                        className={`px-2.5 py-1 rounded transition font-mono ${layout === '1x4' ? 'bg-brand-gold text-black font-bold' : 'hover:text-white'}`}
                                    >
                                        1x4
                                    </button>
                                    <button 
                                        onClick={() => setLayout('2x2')} 
                                        className={`px-2.5 py-1 rounded transition font-mono ${layout === '2x2' ? 'bg-brand-gold text-black font-bold' : 'hover:text-white'}`}
                                    >
                                        2x2
                                    </button>
                                    <button 
                                        onClick={() => setLayout('1x1')} 
                                        className={`px-2.5 py-1 rounded transition font-mono ${layout === '1x1' ? 'bg-brand-gold text-black font-bold' : 'hover:text-white'}`}
                                    >
                                        Single
                                    </button>
                                </div>

                                {/* 2. MINI SQUARE COMMA-SEPARATED GALLERY OVERLAY TRIGGER (Mobile Viewfinder Inject Only) */}
                                <button
                                    onClick={() => setIsGalleryOpen(true)}
                                    className="absolute bottom-3 left-3 w-11 h-11 bg-neutral-900 border border-brand-gold/40 rounded overflow-hidden shadow-xl flex items-center justify-center group active:scale-95 transition lg:hidden z-20"
                                    aria-label="Open captured photostrips gallery sheet drawer"
                                >
                                    {recentStrips && recentStrips.length > 0 ? (
                                        <div className="relative w-full h-full">
                                            <img 
                                                src={recentStrips[0].thumbnailUrl} 
                                                alt="Recent session preview thumbnail" 
                                                className="w-full h-full object-cover filter brightness-90 group-hover:brightness-100"
                                            />
                                            <div className="absolute top-0 right-0 bg-brand-gold text-black text-[9px] font-bold font-mono px-1 rounded-bl leading-none py-0.5">
                                                {recentStrips.length}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="w-full h-full flex flex-col items-center justify-center text-[7px] text-neutral-500 bg-neutral-950 font-mono tracking-tighter leading-none">
                                            <span>NO</span>
                                            <span>SHOTS</span>
                                        </div>
                                    )}
                                </button>

                                {/* Mobile Hardware Lens Swapper Component Inject Loop */}
                                <button 
                                    onClick={() => setCameraFacing(prev => prev === 'rear' ? 'front' : 'rear')}
                                    className="absolute bottom-3 right-3 bg-black/70 border border-neutral-800 p-2.5 rounded-lg text-neutral-300 active:scale-90 transition lg:hidden z-20 shadow-md"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
                                </button>

							</div>
                        </div>

                        {/* ========================================================
                          DESKTOP SIDEBAR CONTROL RIG PANEL
                          ======================================================== */}
                        <div className="hidden lg:flex flex-col w-80 bg-neutral-950 border border-neutral-900 rounded-2xl p-5 justify-between shadow-2xl">
                            
                            <div className="space-y-6">
                                {/* Configuration Metric Controls Group Header */}
                                <div>
                                    <label className="text-[10px] text-neutral-500 font-mono tracking-widest uppercase block mb-2.5">Layout Matrices</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['1x4', '2x2', '1x1'].map((option) => (
                                            <button
                                                key={option}
                                                onClick={() => setLayout(option)}
                                                className={`border font-mono py-2 text-xs rounded transition uppercase tracking-wider ${layout === option ? 'border-brand-gold bg-brand-gold/10 text-brand-gold font-bold' : 'border-neutral-800 text-neutral-400 hover:text-white hover:border-neutral-700'}`}
                                            >
                                                {option === '1x1' ? 'Single' : option}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Desktop Master Storage Feed Component Hook Block Container */}
                                <div>
                                    <label className="text-[10px] text-neutral-500 font-mono tracking-widest uppercase block mb-2.5">Session Output Monitor Pool</label>
                                    <div className="bg-neutral-900 border border-neutral-900/60 rounded-xl p-3 min-h-[180px] max-h-[240px] overflow-y-auto flex flex-col gap-3">
                                        {recentStrips.length > 0 ? (
                                            recentStrips.map((strip, idx) => (
                                                <div key={strip.id} className="flex items-center justify-between bg-black/40 p-2 rounded-lg border border-neutral-800/60 hover:border-neutral-700 transition group">
                                                    <div className="flex items-center gap-3">
                                                        <img src={strip.thumbnailUrl} alt="" className="w-10 h-10 object-cover rounded bg-white border border-neutral-800" />
                                                        <div className="flex flex-col">
                                                            <span className="font-mono text-[11px] text-neutral-300 font-bold">Strip #{recentStrips.length - idx}</span>
                                                            <span className="font-mono text-[9px] text-neutral-500">{strip.timestamp}</span>
                                                        </div>
                                                    </div>
                                                    <button 
                                                        onClick={() => triggerAssetDownload(strip)}
                                                        className="text-[10px] font-mono bg-neutral-800 border border-neutral-700 text-neutral-300 hover:bg-brand-gold hover:text-black px-2.5 py-1 rounded transition uppercase font-black"
                                                    >
                                                        Get
                                                    </button>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-center py-14 text-neutral-600 font-mono text-xs flex flex-col items-center justify-center gap-1">
                                                <span>NO IMAGES AVAILABLE</span>
                                                <span className="text-[9px] text-neutral-700">SHUTTER LOG IS VACANT</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Trigger Base Execution Mechanism Button (Desktop Layout Center Area Container Target) */}
                            <div className="pt-4 border-t border-neutral-900">
                                <button
                                    onClick={triggerPhotoCaptureSequence}
                                    disabled={isShooting || systemStatus !== 'READY'}
                                    className={`w-full py-3.5 rounded-xl font-mono text-xs uppercase tracking-widest transition-all font-black ${
                                        isShooting 
                                        ? 'bg-neutral-900 border border-neutral-800 text-neutral-600 cursor-not-allowed'
                                        : 'bg-brand-gold text-black shadow-lg shadow-brand-gold/10 hover:bg-brand-darkGold active:scale-[0.98]'
                                    }`}
                                >
                                    {isShooting ? 'Processing...' : 'shoot'}
                                </button>
                            </div>

                        </div>
                    </main>

                    {/* ========================================================
                      BOTTOM COLOR MATRIX COMPONENT CONTROL BAR
                      ======================================================== */}
                    <footer className="w-full bg-neutral-950 border-t border-neutral-900 px-4 py-4 z-30">
                        <div className="max-w-4xl mx-auto flex flex-col gap-2.5">
                            <span className="text-[9px] text-neutral-500 font-mono tracking-widest uppercase block text-center lg:text-left">Color Profiles</span>
                            <div className="flex items-center gap-2 overflow-x-auto pb-1.5 pt-0.5 hide-scrollbar w-full px-1">
                                {filterChromaPresets.map((filter) => (
                                    <button
                                        key={filter.id}
                                        onClick={() => setActiveFilter(filter.id)}
                                        className={`flex-shrink-0 px-4 py-2 border rounded-md font-mono text-[11px] tracking-wider transition ${
                                            activeFilter === filter.id
                                            ? 'border-brand-gold bg-brand-gold/10 text-brand-gold font-bold shadow-sm shadow-brand-gold/5'
                                            : 'border-neutral-800/80 text-neutral-400 bg-neutral-900/40 hover:text-white hover:border-neutral-700'
                                        }`}
                                    >
                                        {filter.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </footer>

                    {/* Mobile Global Static Fixed Trigger Shoot Module Interface Panel */}
                    <div className="lg:hidden fixed bottom-20 right-4 z-30">
                        <button
                            onClick={triggerPhotoCaptureSequence}
                            disabled={isShooting}
                            className={`w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition border font-mono font-bold uppercase text-[10px] tracking-wide ${
                                isShooting 
                                ? 'bg-neutral-900 border-neutral-800 text-neutral-600' 
                                : 'bg-brand-gold text-black border-brand-darkGold active:scale-90 shadow-brand-gold/20'
                            }`}
                        >
                            {isShooting ? '...' : 'shoot'}
                        </button>
                    </div>

                    {/* ========================================================
                      NEW PATCH: DOWNLOAD GALERIE OVERLAY MODAL DRAWER
                      ======================================================== */}
                    {isGalleryOpen && (
                        <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-xs flex flex-col justify-end lg:hidden animate-fade-in">
                            
                            {/* Mask Click Container Interface Closer */}
                            <div className="flex-grow" onClick={() => setIsGalleryOpen(false)} />

                            {/* Sliding Sheet Frame Content Panel Container Context */}
                            <div className="bg-neutral-950 border-t border-neutral-800/80 rounded-t-3xl p-5 max-h-[75vh] overflow-y-auto shadow-2xl flex flex-col animate-slide-up">
                                
                                {/* Sheet Drawer Top Panel Flex Header Group */}
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-brand-gold font-mono tracking-widest text-xs uppercase font-black">
                                        Captured Photo Strips
                                    </h3>
                                    <button 
                                        onClick={() => setIsGalleryOpen(false)}
                                        className="text-neutral-400 hover:text-white font-mono text-[11px] uppercase bg-neutral-900 px-3.5 py-1 rounded border border-neutral-800 active:bg-neutral-800 transition"
                                    >
                                        Close
                                    </button>
                                </div>

                                {/* --- BRANDING INJECTION LINE (Replaces Asset Loss-less specification) --- */}
                                <div className="mb-5 pb-3 border-b border-neutral-900/60 text-center">
                                    <p className="text-[11px] font-mono tracking-wider text-neutral-500 lowercase">
                                        made by <span className="text-neutral-300 font-semibold">@hustino.28</span> on instagram
                                    </p>
                                </div>

                                {/* Image Micro List Node Dynamic Generator Engine Block */}
                                {recentStrips && recentStrips.length > 0 ? (
                                    <div className="grid grid-cols-2 gap-4 pb-6">
                                        {recentStrips.map((strip, mapIdx) => (
                                            <div 
                                                key={strip.id || mapIdx} 
                                                className="bg-neutral-900 p-2.5 rounded-xl border border-neutral-800/70 flex flex-col gap-2.5 shadow-md"
                                            >
                                                {/* Structural Container Framing Profile Representation Box */}
                                                <div className="bg-white p-1 rounded-sm shadow-inner aspect-[1/3] overflow-hidden flex items-center justify-center">
                                                    <img 
                                                        src={strip.url} 
                                                        alt={`Session snapshot asset frame row node`} 
                                                        className="w-full h-full object-contain"
                                                    />
                                                </div>
                                                
                                                {/* Trigger Local Storage Device Canvas Download Execution Anchor */}
                                                <button
                                                    onClick={() => triggerAssetDownload(strip)}
                                                    className="w-full bg-brand-gold text-black font-mono font-bold py-2 rounded-lg text-xs uppercase tracking-wider text-center active:bg-brand-darkGold transition"
                                                >
                                                    Download
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    /* Empty Session Content Logger Panel Fallback */
                                    <div className="text-center py-16 text-neutral-600 font-mono text-xs border border-dashed border-neutral-900 rounded-2xl my-2">
                                        No active shots taken in this session.<br />
                                        <span className="text-neutral-500 mt-1 inline-block">Hit "shoot" to generate frames!</span>
                                    </div>
                                )}

                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // --- Render Assembly Target Node Processing Trigger ---
        const domTargetNodeContainer = document.getElementById('photobooth-root');
        const reactApplicationRoot = ReactDOM.createRoot(domTargetNodeContainer);
        reactApplicationRoot.render(<DarkroomPhotoboothApp />);
    </script>
</body>
</html>
