<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>darkroom — photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── Themes ── */
[data-theme="light"]{  
  --bg:#f5f1eb; --surface:#ffffff; --surface2:#f0ece4; --border:#ddd5c8;  
  --text:#1a1612; --text-dim:#6b6158; --text-muted:#a09488;  
  --amber:#c07810; --amber-bg:rgba(192,120,16,.10); --amber-glow:rgba(192,120,16,.22);  
  --pol-paper:#fffef9; --pol-border:#ede5d8;  
  --pol-shadow:0 3px 16px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.07);  
  --pol-hover:0 10px 32px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.10);  
  --meta-col:#8a7a68; --act-border:#c8b8a8;  
  --grain-op:.14; --vig:rgba(205,196,182,.45);  
  --vf-bg:#1a1612; --sheet-bg:rgba(245,241,235,.97); --scrollbar:#c8bfb4;  
  --overlay-btn:rgba(0,0,0,.55); --overlay-btn-border:rgba(255,255,255,.15);  
  --filmstrip-bg:rgba(245,241,235,.96);
}
[data-theme="dark"]{  
  --bg:#0c0b09; --surface:#131210; --surface2:#1c1a17; --border:#2d2a24;  
  --text:#e6ddd0; --text-dim:#7a7060; --text-muted:#4e4840;  
  --amber:#e0981c; --amber-bg:rgba(224,152,28,.10); --amber-glow:rgba(224,152,28,.20);  
  --pol-paper:#f5f0e8; --pol-border:#ede5d8;  
  --pol-shadow:0 4px 20px rgba(0,0,0,.55),0 1px 4px rgba(0,0,0,.30);  
  --pol-hover:0 12px 36px rgba(0,0,0,.65),0 2px 8px rgba(0,0,0,.40);  
  --meta-col:#8a7060; --act-border:#c0ae98;  
  --grain-op:.24; --vig:transparent;  
  --vf-bg:#0c0b09; --sheet-bg:rgba(13,12,10,.97); --scrollbar:#2d2a24;  
  --overlay-btn:rgba(0,0,0,.65); --overlay-btn-border:rgba(255,255,255,.10);  
  --filmstrip-bg:rgba(13,12,10,.96);
}

html,body{  
  height:100%;  
  overflow:hidden;  
  background:var(--bg);color:var(--text);  
  font-family:'DM Sans',sans-serif;  
  -webkit-tap-highlight-color:transparent;
}

/* Grain Overlays */
body::before{  
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;  
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3C/rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");  
  background-size:200px 200px;opacity:var(--grain-op);mix-blend-mode:multiply;
}
body::after{  
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;  
  background:radial-gradient(ellipse at center,transparent 40%,var(--vig) 100%);
}

.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

header{  
  display:flex;align-items:center;justify-content:space-between;  
  padding:0 16px;height:48px;min-height:48px;  
  border-bottom:1px solid var(--border);background:var(--surface);  
  position:relative;z-index:100;flex-shrink:0;
}
.logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--amber);display:flex;align-items:baseline;gap:6px;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);font-style:italic;letter-spacing:.06em;}
.hdr-right{display:flex;gap:6px;align-items:center;}

.pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:100px;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap;}
.pill.live{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);display:flex;align-items:center;gap:4px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 2s ease-in-out infinite;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.icon-btn{  
  width:32px;height:32px;border-radius:50%;  
  border:1px solid var(--border);background:var(--surface2);  
  color:var(--text-dim);cursor:pointer;font-size:15px;  
  display:flex;align-items:center;justify-content:center;  
  transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{border-color:var(--amber);color:var(--amber);}
.icon-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}

/* Polaroid Styles */
.pol{  
  background:var(--pol-paper);padding:7px 7px 34px;  
  box-shadow:var(--pol-shadow);position:relative;flex-shrink:0;  
  animation:slideUp .28s ease forwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(8px) rotate(var(--tilt,0deg))}to{opacity:1;transform:translateY(0) rotate(var(--tilt,0deg))}}
.pol-img{width:100%;display:block;border:1px solid var(--pol-border);object-fit:cover;}
.pol-foot{position:absolute;bottom:0;left:0;right:0;padding:0 7px 5px;display:flex;justify-content:space-between;align-items:flex-end;}
.p-meta{font-family:'DM Mono',monospace;font-size:7px;color:var(--meta-col);line-height:1.6;}
.p-acts{display:flex;gap:3px;}
.p-btn{  
  width:24px;height:24px;border-radius:50%;  
  border:1px solid var(--act-border);background:transparent;  
  cursor:pointer;display:flex;align-items:center;justify-content:center;  
  font-size:11px;color:var(--meta-col);transition:all .15s;
}
.p-btn:hover,.p-btn:active{background:var(--bg);border-color:var(--amber);color:var(--amber);}

.prow{display:grid;gap:7px;}
.prow.c2{grid-template-columns:repeat(2,1fr);}
.prow.c3{grid-template-columns:repeat(3,1fr);}
.prow.c4{grid-template-columns:repeat(4,1fr);}

.toast{  
  position:fixed;bottom:120px;left:50%;  
  transform:translateX(-50%) translateY(60px);  
  background:var(--text);color:var(--bg);  
  font-family:'DM Mono',monospace;font-size:11px;  
  letter-spacing:.07em;padding:8px 18px;  
  border-radius:100px;z-index:10000;  
  transition:transform .25s ease;white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── MOBILE VIEWFINDER ── */
.vf-panel{  
  flex:1;position:relative;overflow:hidden;  
  background:var(--vf-bg);min-height:0;
}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}
#video.mirrored{transform:scaleX(-1);}
.vf-overlay{position:absolute;inset:0;pointer-events:none;}
.corner{position:absolute;width:18px;height:18px;border-color:var(--amber);border-style:solid;opacity:.6;}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;}
.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;}
.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;}
.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;}
.flash-el{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .04s;}
.flash-el.on{opacity:1;}
.cd-num{  
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);  
  font-family:'DM Serif Display',serif;font-size:88px;color:#fff;  
  text-shadow:0 4px 28px rgba(0,0,0,.75);opacity:0;transition:opacity .18s;z-index:10;line-height:1;
}
.cd-num.show{opacity:1;}
.vf-tag{  
  position:absolute;bottom:10px;left:10px;  
  font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);  
  letter-spacing:.14em;text-transform:uppercase;  
  background:rgba(0,0,0,.55);padding:3px 7px;border-radius:2px;  
  border:1px solid rgba(180,110,10,.4);pointer-events:none;
}
.no-cam{  
  position:absolute;inset:0;display:flex;flex-direction:column;  
  align-items:center;justify-content:center;gap:14px;background:var(--vf-bg);  
  z-index:5;
}
.no-cam svg{opacity:.15;}
.no-cam-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}
.no-cam-btn{  
  padding:11px 28px;background:var(--amber);border:none;border-radius:7px;  
  color:#fff;font-family:'DM Serif Display',serif;font-size:16px;  
  cursor:pointer;letter-spacing:.02em;transition:all .15s;
}
.no-cam-btn:active{transform:scale(.95);}

.vf-controls{  
  position:absolute;top:10px;right:10px;  
  display:flex;flex-direction:column;gap:6px;z-index:20;
}
.vf-ctrl-btn{  
  width:34px;height:34px;border-radius:50%;  
  background:var(--overlay-btn);border:1px solid var(--overlay-btn-border);  
  color:#fff;font-size:14px;cursor:pointer;  
  display:flex;align-items:center;justify-content:center;  
  transition:all .15s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.vf-ctrl-btn:active{transform:scale(.88);}
.vf-ctrl-btn.on{border-color:var(--amber);color:var(--amber);}

.vf-cam-row{  
  position:absolute;bottom:10px;right:10px;  
  display:flex;gap:4px;z-index:20;
}
.vf-cam-btn{  
  font-family:'DM Mono',monospace;font-size:9px;  
  padding:5px 8px;border-radius:4px;  
  background:var(--overlay-btn);border:1px solid var(--overlay-btn-border);  
  color:rgba(255,255,255,.8);cursor:pointer;transition:all .15s;  
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);line-height:1;
}
.vf-cam-btn:active{transform:scale(.9);;}
.vf-cam-btn.active{border-color:var(--amber);color:var(--amber);}

/* ── MOBILE ACTIONS INTERFACE PANEL ── */
.bottom-bar{  
  flex-shrink:0;  
  background:var(--surface);  
  border-top:1px solid var(--border);  
  position:relative;  
  z-index:300;
}
.filter-strip{  
  display:flex;overflow-x:auto;overflow-y:hidden;  
  padding:7px 10px 5px;border-bottom:1px solid var(--border);  
  -webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px;
}
.filter-strip::-webkit-scrollbar{display:none;}
.fchip{  
  display:flex;flex-direction:column;align-items:center;  
  gap:3px;padding:4px 7px;border-radius:5px;cursor:pointer;  
  border:1px solid transparent;transition:all .15s;flex-shrink:0;min-width:50px;
}
.fchip:active{transform:scale(.92);}
.fchip.active{background:var(--amber-bg);border-color:var(--amber);}
.fthumb{width:32px;height:22px;border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.fthumb-inner{width:100%;height:100%;background:linear-gradient(135deg,#c8b090,#907060,#604030);}
.fchip-name{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:.03em;white-space:nowrap;}
.fchip.active .fchip-name{color:var(--amber);}

.shoot-row{  
  display:flex;align-items:center;gap:8px;  
  padding:9px 14px;  
  padding-bottom:calc(9px + env(safe-area-inset-bottom, 0px));
}
.timer-sel{  
  font-family:'DM Mono',monospace;font-size:10px;  
  background:var(--surface2);border:1px solid var(--border);  
  color:var(--text);padding:8px;border-radius:5px;  
  cursor:pointer;outline:none;flex:1;min-width:0;
}
.mob-shoot-btn{  
  padding:10px 22px;  
  background:var(--amber);border:none;border-radius:7px;  
  color:#fff;font-family:'DM Serif Display',serif;font-size:16px;  
  cursor:pointer;transition:all .15s;letter-spacing:.02em;flex-shrink:0;  
  min-height:44px;min-width:80px;
}
.mob-shoot-btn:active{transform:scale(.94);filter:brightness(.9);}
.mob-shoot-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:none;}

/* ── COMPACT FILMSTRIP BAR ── */
.filmstrip-bar{  
  flex-shrink:0;  
  background:var(--filmstrip-bg);  
  border-top:1px solid var(--border);  
  display:flex;align-items:center;gap:0;  
  height:62px;  
  position:relative;  
  z-index:290;  
  overflow:hidden;
}
.filmstrip-thumbs{  
  flex:1;display:flex;gap:5px;  
  overflow-x:auto;overflow-y:hidden;  
  padding:7px 10px;  
  -webkit-overflow-scrolling:touch;scrollbar-width:none;  
  align-items:center;
}
.filmstrip-thumbs::-webkit-scrollbar{display:none;}
.fs-thumb{  
  width:42px;height:42px;flex-shrink:0;  
  background:var(--pol-paper);  
  padding:2px 2px 10px;  
  box-shadow:0 2px 6px rgba(0,0,0,.15);  
  cursor:pointer;position:relative;  
  animation:fsIn .2s ease forwards;
}
@keyframes fsIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.fs-thumb img{width:100%;height:26px;object-fit:cover;display:block;border:1px solid var(--pol-border);}
.fs-empty{  
  font-family:'DM Mono',monospace;font-size:9px;  
  color:var(--text-muted);letter-spacing:.1em;padding:0 14px;opacity:.7;
}
.gallery-open-btn{  
  flex-shrink:0;  
  width:52px;height:62px;  
  background:transparent;border:none;border-left:1px solid var(--border);  
  color:var(--text-dim);cursor:pointer;  
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;  
  transition:background .15s;padding:0;
}
.gallery-open-btn:active{background:var(--surface2);}
.gallery-open-btn span:first-child{font-size:16px;}
.gallery-open-btn .gal-lbl{font-family:'DM Mono',monospace;font-size:7px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}

/* ── PROGRESSIVE DISCLOSURE ARCHIVE SLIDE DRAWER ── */
.roll-sheet{  
  position:fixed;  
  bottom:0;left:0;right:0;  
  background:var(--sheet-bg);  
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);  
  border-radius:16px 16px 0 0;  
  border-top:1px solid var(--border);  
  z-index:200;  
  transform:translateY(100%);  
  transition:transform .32s cubic-bezier(.32,0,.67,0);  
  max-height:85dvh;  
  display:flex;flex-direction:column;overflow:hidden;  
  pointer-events:none;
}
.roll-sheet.open{  
  transform:translateY(0);  
  transition:transform .38s cubic-bezier(.33,1,.68,1);  
  pointer-events:auto;
}
.sheet-handle{  
  flex-shrink:0;padding:10px 16px 8px;  
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;user-select:none;
}
.handle-bar{width:36px;height:4px;border-radius:2px;background:var(--border);}
.sheet-header{width:100%;display:flex;align-items:center;justify-content:space-between;}
.shot-ctr{font-family:'DM Serif Display',serif;font-size:19px;color:var(--amber);line-height:1;}
.shot-ctr small{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-left:2px;}
.layout-picker{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.lp-btn{  
  font-family:'DM Mono',monospace;font-size:9px;padding:4px 7px;border-radius:4px;  
  border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;
}
.lp-btn:active{transform:scale(.9);}
.lp-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

.pol-grid{  
  flex:1;padding:10px 14px 6px;  
  overflow-y:auto;-webkit-overflow-scrolling:touch;  
  display:flex;flex-direction:column;gap:12px;min-height:0;
}
.pol-grid::-webkit-scrollbar{width:3px;}
.pol-grid::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}
.empty-st{  
  flex:1;display:flex;flex-direction:column;  
  align-items:center;justify-content:center;  
  gap:8px;text-align:center;padding:28px 0;
}
.empty-st .ei{font-size:26px;opacity:.18;filter:grayscale(1);}
.empty-st p{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;line-height:2;}

.roll-foot{  
  padding:8px 12px;  
  padding-bottom:calc(8px + env(safe-area-inset-bottom, 0px));  
  border-top:1px solid var(--border);  
  display:flex;gap:6px;background:var(--surface);flex-shrink:0;
}
.ft-btn{  
  flex:1;padding:10px 6px;  
  font-family:'DM Mono',monospace;font-size:9px;  
  letter-spacing:.07em;text-transform:uppercase;  
  border-radius:6px;border:1px solid var(--border);  
  background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;
}
.ft-btn:active{transform:scale(.96);}
.ft-btn.pri{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
.ft-btn:disabled{opacity:.28;cursor:not-allowed;transform:none;}

.sheet-backdrop{  
  position:fixed;inset:0;  
  background:rgba(0,0,0,.35);  
  z-index:199;  
  opacity:0;pointer-events:none;  
  transition:opacity .3s ease;
}
.sheet-backdrop.show{opacity:1;pointer-events:auto;}

/* ── DESKTOP RECOVERY MATRIX (>= 769px) ── */
@media(min-width:769px){  
  .vf-panel,.bottom-bar,.filmstrip-bar,.roll-sheet,.sheet-backdrop,.vf-controls,.vf-cam-row{display:none!important;}  
  .toast{bottom:28px;}  
  .app{    
    height:100vh;    
    display:grid;    
    grid-template-rows:52px 1fr 34px;  
  }  
  header{height:52px;padding:0 24px;}  
  .logo{font-size:19px;}  
  .pill{font-size:10px;padding:4px 10px;}  
  .icon-btn{width:30px;height:30px;}  
  .desk-main{    
    display:grid;    
    grid-template-columns:256px 1fr 320px;    
    overflow:hidden;  
  }  
  .desk-sidebar{    
    display:flex;flex-direction:column;    
    border-right:1px solid var(--border);    
    background:var(--surface);overflow:hidden;  
  }  
  .sb-block{    
    padding:13px 14px;border-bottom:1px solid var(--border);    
    display:flex;flex-direction:column;gap:9px;flex-shrink:0;  
  }  
  .sb-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.18em;text-transform:uppercase;}  
  .desk-cam-sw{display:flex;gap:3px;}  
  .desk-cam-btn{    
    flex:1;font-family:'DM Mono',monospace;font-size:10px;    
    padding:6px 4px;border-radius:4px;border:1px solid var(--border);    
    background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;text-align:center;  
  }  
  .desk-cam-btn:hover{border-color:var(--amber);color:var(--amber);}  
  .desk-cam-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}  
  .mirror-row{display:flex;align-items:center;justify-content:space-between;}  
  .toggle-track{    
    width:34px;height:19px;border-radius:10px;background:var(--border);    
    cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0;  
  }  
  .toggle-track.on{background:var(--amber);}  
  .toggle-thumb{    
    position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;border-radius:50%;    
    background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);  
  }  
  .toggle-track.on .toggle-thumb{left:18px;}  
  .toggle-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}  
  .desk-filter-list{    
    flex:1;overflow-y:auto;padding:7px 10px;    
    display:flex;flex-direction:column;gap:3px;  
  }  
  .desk-filter-list::-webkit-scrollbar{width:3px;}  
  .desk-filter-list::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}  
  .desk-fchip{    
    display:flex;align-items:center;gap:9px;    
    padding:6px 8px;border-radius:5px;cursor:pointer;    
    border:1px solid transparent;transition:all .15s;  
  }  
  .desk-fchip:hover{background:var(--surface2);border-color:var(--border);}  
  .desk-fchip.active{background:var(--amber-bg);border-color:var(--amber);}  
  .desk-fthumb{width:36px;height:26px;border-radius:3px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);}  
  .desk-fthumb-inner{width:100%;height:100%;background:linear-gradient(135deg,#c8b090,#907060,#604030);}  
  .desk-fchip-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.05em;}  
  .desk-fchip.active .desk-fchip-name{color:var(--amber);}  
  .desk-shoot-section{    
    padding:11px 14px;border-top:1px solid var(--border);    
    display:flex;flex-direction:column;gap:7px;flex-shrink:0;  
  }  
  .desk-timer{    
    font-family:'DM Mono',monospace;font-size:11px;    
    background:var(--surface2);border:1px solid var(--border);    
    color:var(--text);padding:8px 10px;border-radius:5px;    
    cursor:pointer;outline:none;width:100%;transition:border-color .15s;  
  }  
  .desk-timer:hover{border-color:var(--amber);}  
  .desk-shoot-btn{    
    width:100%;padding:12px;    
    background:var(--amber);border:none;border-radius:6px;    
    color:#fff;font-family:'DM Serif Display',serif;font-size:16px;    
    cursor:pointer;transition:all .15s;letter-spacing:.02em;  
  }  
  .desk-shoot-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}  
  .desk-shoot-btn:active{transform:none;filter:none;}  
  .desk-shoot-btn:disabled{opacity:.32;cursor:not-allowed;transform:none;}  
  .desk-allow-btn{    
    width:100%;padding:9px;    
    background:transparent;border:1px solid var(--amber);border-radius:5px;    
   color: var(--amber); font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;  
  }  
  .desk-allow-btn:hover{background:var(--amber-bg);}  
  .desk-vf{    
    display:flex;align-items:center;justify-content:center;    
    padding:20px;background:var(--bg);overflow:hidden;position:relative;  
  }  
  .desk-vf-wrap{    
    position:relative;width:100%;max-width:640px;    
    background:var(--vf-bg);border-radius:8px;overflow:hidden;    
    border:1px solid var(--border);    
    aspect-ratio:4/3;    
    max-height:calc(100vh - 52px - 34px - 40px);  
  }  
  .desk-vf-wrap video{width:100%;height:100%;object-fit:cover;display:block;}  
  .desk-vf-wrap video.mirrored{transform:scaleX(-1);}  
  .desk-no-cam{    
    position:absolute;inset:0;display:flex;flex-direction:column;    
    align-items:center;justify-content:center;gap:12px;background:var(--vf-bg);  
  }  
  .desk-no-cam svg{opacity:.15;}  
  .desk-no-cam-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}  
  .desk-vf-overlay{position:absolute;inset:0;pointer-events:none;}  
  .desk-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .04s;}  
  .desk-flash.on{opacity:1;}  
  .desk-cdnum{    
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);    
    font-family:'DM Serif Display',serif;font-size:88px;color:#fff;    
    text-shadow:0 4px 28px rgba(0,0,0,.75);opacity:0;transition:opacity .18s;z-index:10;line-height:1;  }  
  .desk-cdnum.show{opacity:1;}  
  .desk-vf-tag{    
    position:absolute;bottom:10px;left:10px;    
    font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);    
    letter-spacing:.14em;text-transform:uppercase;    
    background:rgba(0,0,0,.55);padding:3px 7px;border-radius:2px;    
    border:1px solid rgba(180,110,10,.4);  
  }  
  .desk-roll{    
    display:flex;flex-direction:column;    
    border-left:1px solid var(--border);    
    background:var(--surface);overflow:hidden;  
  }  
  .desk-roll-hdr{    
    padding:11px 14px 9px;border-bottom:1px solid var(--border);    
    display:flex;justify-content:space-between;align-items:flex-start;    
    flex-shrink:0;gap:8px;  
  }  
  .desk-shot-ctr{font-family:'DM Serif Display',serif;font-size:24px;color:var(--amber);line-height:1;}  
  .desk-shot-ctr small{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-left:2px;}  
  .desk-layout-picker{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}  
  .desk-lp-btn{    
    font-family:'DM Mono',monospace;font-size:9px;    
    padding:4px 7px;border-radius:4px;border:1px solid var(--border);    
    background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;  
  }  
  .desk-lp-btn:hover{border-color:var(--amber);color:var(--amber);}  
  .desk-lp-btn.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}  
  .desk-pol-grid{    
    flex:1;padding:12px;overflow-y:auto;    
    display:flex;flex-direction:column;gap:12px;  
  }  
  .desk-pol-grid::-webkit-scrollbar{width:3px;}  
  .desk-pol-grid::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}  
  .desk-pol-grid .pol:hover{transform:translateY(-4px) rotate(var(--tilt,0deg)) scale(1.03)!important;box-shadow:var(--pol-hover)!important;z-index:10;}  
  .desk-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;}  
  .desk-empty .ei{font-size:28px;opacity:.18;filter:grayscale(1);}

  .desk-roll-foot{    
    padding:9px 12px;border-top:1px solid var(--border);    
    display:flex;gap:6px;background:var(--surface);flex-shrink:0;  
  }  
  .desk-ft-btn{    
    flex:1;padding:9px 6px;    
    font-family:'DM Mono',monospace;font-size:9px;    
    letter-spacing:.07em;text-transform:uppercase;    
    border-radius:5px;border:1px solid var(--border);

  .desk-ft-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}  
  .desk-ft-btn.pri{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}  
  .desk-ft-btn.pri:hover{background:var(--amber-glow);}

  footer{    
    display:flex;align-items:center;justify-content:center;    
    border-top:1px solid var(--border);background:var(--bg);    
    position:relative;z-index:1;flex-shrink:0;height:34px;

  .foot-handle{color:var(--amber);}  
  .foot-dot{color:var(--amber);}
}

.desk-main,.desk-sidebar,.desk-vf,.desk-roll,footer{display:none;}
@media(min-width:769px){  
  .desk-main{display:grid;}  
  .desk-sidebar,.desk-vf,.desk-roll{display:flex;}

}

<script>
// Chromatic Filter Definitions
const filters = [
  { id: 'raw', name: 'RAW', css: 'contrast(1) brightness(1)' },
  { id: 'kodak', name: 'KODAK Gold', css: 'contrast(1.2) brightness(0.95) sepia(0.12) saturate(1.25)' },
  { id: 'ilford', name: 'ILFORD B&W', css: 'grayscale(1) contrast(1.3) brightness(0.95)' },
  { id: 'lomo', name: 'LOMO LC-A', css: 'contrast(1.3) saturate(1.4) brightness(0.98)' },
  { id: 'fade', name: 'PORTRA Fade', css: 'brightness(1.04) contrast(0.92) saturate(0.85)' },
  { id: 'warm', name: 'WARM Film', css: 'sepia(0.18) saturate(1.05) brightness(1)' },
  { id: 'cool', name: 'COOL Cine', css: 'saturate(0.95) hue-rotate(10deg) brightness(0.96)' },
  { id: 'velvia', name: 'FUJI Velvia', css: 'contrast(1.15) saturate(1.3) brightness(0.98)' }
];

// Persistent Session State Arrays
let activeFilter = 'raw';
let activeLayout = '1x1';
let activeFacing = 'environment'; 
let isMirrored = false;
let currentStream = null;
let takenStrips = []; 
let isCapturing = false;

// ── THEME SWITCHER RESILIENCE ──
function initThemeSystem() {
  const cachedTheme = localStorage.getItem('darkroom-pref-theme');
  if (cachedTheme) {
    document.documentElement.setAttribute('data-theme', cachedTheme);
  } else {
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    document.documentElement.setAttribute('data-theme', prefersLight ? 'light' : 'dark');
  }
  updateThemeButtonUI();
}

function toggleTheme() {
  const active = document.documentElement.getAttribute('data-theme');
  const target = active === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', target);
  localStorage.setItem('darkroom-pref-theme', target);
  updateThemeButtonUI();
}

function updateThemeButtonUI() {
  const themeBtn = document.getElementById('theme-btn');
  const active = document.documentElement.getAttribute('data-theme');
  if (themeBtn) themeBtn.innerHTML = active === 'light' ? '☾' : '☀';
}

// ── WEBRTC MEDIA CONTEXT SYSTEMS ──
async function startCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }
  
  const statusText = document.getElementById('status-text');
  if (statusText) statusText.innerText = 'connecting';

  const constraints = {
    audio: false,
    video: {
      facingMode: activeFacing === 'any' ? undefined : activeFacing,
      width: { ideal: 1280 },
      height: { ideal: 960 }
    }
  };

  try {
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    
    // Bind to mobile hardware nodes
    const mVideo = document.getElementById('video');
    if (mVideo) {
      mVideo.srcObject = currentStream;
      mVideo.onloadedmetadata = () => mVideo.play();
    }
    
    // Bind to desktop hardware nodes
    const dVideo = document.getElementById('desk-video');
    if (dVideo) {
      dVideo.srcObject = currentStream;
      dVideo.onloadedmetadata = () => dVideo.play();
    }

    if (statusText) statusText.innerText = 'live';
    
    document.getElementById('no-cam').style.display = 'none';
    const dNoCam = document.getElementById('desk-no-cam');
    if (dNoCam) dNoCam.style.display = 'none';
    
    document.getElementById('mob-shoot-btn').disabled = false;
    const dShootBtn = document.getElementById('desk-shoot-btn');
    if (dShootBtn) dShootBtn.disabled = false;

    // Output track configuration information to header display pill
    const activeTrack = currentStream.getVideoTracks()[0];
    if (activeTrack) {
      const label = activeTrack.label || 'Camera';
      const pill = document.getElementById('cam-pill');
      if (pill) {
        pill.style.display = 'inline-block';
        pill.innerText = label.length > 18 ? label.substring(0, 16) + '..' : label;
      }
    }
  } catch (err) {
    console.error("Hardware link error: ", err);
    if (statusText) statusText.innerText = 'fault';
    showToast("camera initialization failed");
  }
}

function switchCam(mode) {
  activeFacing = mode;
  ['mob-btn-rear','mob-btn-front','mob-btn-any','desk-btn-rear','desk-btn-front','desk-btn-any'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  
  if (mode === 'environment') {
    if(document.getElementById('mob-btn-rear')) document.getElementById('mob-btn-rear').classList.add('active');
    if(document.getElementById('desk-btn-rear')) document.getElementById('desk-btn-rear').classList.add('active');
  } else if (mode === 'user') {
    if(document.getElementById('mob-btn-front')) document.getElementById('mob-btn-front').classList.add('active');
    if(document.getElementById('desk-btn-front')) document.getElementById('desk-btn-front').classList.add('active');
  } else {
    if(document.getElementById('mob-btn-any')) document.getElementById('mob-btn-any').classList.add('active');
    if(document.getElementById('desk-btn-any')) document.getElementById('desk-btn-any').classList.add('active');
  }
  startCamera();
}

function toggleMirror() {
  isMirrored = !isMirrored;
  const mV = document.getElementById('video');
  const dV = document.getElementById('desk-video');
  const dTrack = document.getElementById('desk-mirror-toggle');
  
  if (isMirrored) {
    if (mV) mV.classList.add('mirrored');
    if (dV) dV.classList.add('mirrored');
    if (dTrack) dTrack.classList.add('on');
    if (document.getElementById('mirror-btn')) document.getElementById('mirror-btn').classList.add('on');
    if (document.getElementById('mob-mirror-btn')) document.getElementById('mob-mirror-btn').classList.add('on');
  } else {
    if (mV) mV.classList.remove('mirrored');
    if (dV) dV.classList.remove('mirrored');
    if (dTrack) dTrack.classList.remove('on');
    if (document.getElementById('mirror-btn')) document.getElementById('mirror-btn').classList.remove('on');
    if (document.getElementById('mob-mirror-btn')) document.getElementById('mob-mirror-btn').classList.remove('on');
  }
}

// ── SELECTION ELEMENT BUILDERS ──
function buildFilterStrips() {
  const mobStrip = document.getElementById('mob-filter-list');
  const deskList = document.getElementById('desk-filter-list');
  
  filters.forEach(f => {
    // Mobil Chip Layout
    const mChip = document.createElement('div');
    mChip.className = `fchip ${f.id === activeFilter ? 'active' : ''}`;
    mChip.id = `m-f-${f.id}`;
    mChip.onclick = () => setFilter(f.id);
    mChip.innerHTML = `
      <div class="fthumb"><div class="fthumb-inner" style="filter: ${f.css}"></div></div>
      <span class="fchip-name">${f.name.split(' ')[0]}</span>
    `;
    if (mobStrip) mobStrip.appendChild(mChip);

    // Desktop Row Layout
    const dChip = document.createElement('div');
    dChip.className = `desk-fchip ${f.id === activeFilter ? 'active' : ''}`;
    dChip.id = `d-f-${f.id}`;
    dChip.onclick = () => setFilter(f.id);
    dChip.innerHTML = `
      <div class="desk-fthumb"><div class="desk-fthumb-inner" style="filter: ${f.css}"></div></div>
      <span class="desk-fchip-name">${f.name}</span>
    `;
    if (deskList) deskList.appendChild(dChip);
  });
}

function setFilter(id) {
  activeFilter = id;
  const fObj = filters.find(f => f.id === id);
  
  // Apply direct CSS strings to live capture streams
  const mV = document.getElementById('video');
  const dV = document.getElementById('desk-video');
  if (mV) mV.style.filter = fObj ? fObj.css : 'none';
  if (dV) dV.style.filter = fObj ? fObj.css : 'none';
  
  const mTag = document.getElementById('vf-tag');
  const dTag = document.getElementById('desk-vf-tag');
  if (mTag) mTag.innerText = fObj ? fObj.name : 'RAW';
  if (dTag) dTag.innerText = fObj ? fObj.name : 'RAW';

  filters.forEach(f => {
    const mc = document.getElementById(`m-f-${f.id}`);
    const dc = document.getElementById(`d-f-${f.id}`);
    if (mc) mc.classList.toggle('active', f.id === id);
    if (dc) dc.classList.toggle('active', f.id === id);
  });
}

function setLayout(lay, event) {
  if (event) event.stopPropagation();
  activeLayout = lay;
  
  document.querySelectorAll('#mob-layout-picker .lp-btn, #desk-layout-picker .desk-lp-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-l') === lay);
  });
}

// ── PHOTO BURST ENGINE & CANVAS COMPILER ──
async function capturePhoto() {
  if (isCapturing || !currentStream) return;
  isCapturing = true;

  // Sync state across mobile and desktop control selectors
  document.getElementById('mob-shoot-btn').disabled = true;
  const dShoot = document.getElementById('desk-shoot-btn');
  if (dShoot) dShoot.disabled = true;

  // Check active viewport media state to extract target latency value
  const isDesktop = window.innerWidth >= 769;
  const timerSelector = isDesktop ? document.getElementById('desk-timer') : document.getElementById('mob-timer');
  let delaySeconds = parseInt(timerSelector ? timerSelector.value : '0', 10);

  // Parse multi-frame array boundaries from requested layout matrix configuration string
  const totalSlots = activeLayout.split('x').reduce((a, b) => parseInt(a, 10) * parseInt(b, 10), 1);
  const framesArray = [];

  const cdNum = document.getElementById(isDesktop ? 'desk-cdnum' : 'cdnum');

  for (let frameIdx = 0; frameIdx < totalSlots; frameIdx++) {
    let currentDelay = delaySeconds;
    
    // Enforce an immediate 1.5 second interval cadence on later burst frames if timer was 0
    if (frameIdx > 0 && currentDelay === 0) {
      currentDelay = 1.5;
    }

    if (currentDelay > 0) {
      if (cdNum) cdNum.classList.add('show');
      for (let clock = Math.ceil(currentDelay); clock > 0; clock--) {
        if (cdNum) cdNum.innerText = clock;
        await new Promise(r => setTimeout(r, 1000));
      }
      if (cdNum) cdNum.classList.remove('show');
    }

    // Capture from the active media source context matching device orientation
    const frameBuffer = captureStreamToBuffer(isDesktop);
    if (frameBuffer) framesArray.push(frameBuffer);
    
    // Flash Shutter Effect Trigger Loop
    const flashNode = document.getElementById(isDesktop ? 'desk-flash' : 'flash');
    if (flashNode) {
      flashNode.classList.add('on');
      await new Promise(r => setTimeout(r, 60));
      flashNode.classList.remove('on');
    }
    
    // Short breather period before recycling next shot execution phase
    await new Promise(r => setTimeout(r, 400));
  }

  // Compile individual snapshot frames down into a unified canvas matrix strip asset
  renderStripAsset(framesArray);

  isCapturing = false;
  document.getElementById('mob-shoot-btn').disabled = false;
  if (dShoot) dShoot.disabled = false;
}

function captureStreamToBuffer(isDesktop) {
  const videoNode = document.getElementById(isDesktop ? 'desk-video' : 'video');
  if (!videoNode || videoNode.paused || videoNode.ended) return null;

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = videoNode.videoWidth || 640;
  tempCanvas.height = videoNode.videoHeight || 480;
  const ctx = tempCanvas.getContext('2d');
  
  if (!ctx) return null;

  // Mirror coordinate translations if feature track toggle is flipped active
  if (isMirrored) {
    ctx.translate(tempCanvas.width, 0);
    ctx.scale(-1, 1);
  }

  ctx.drawImage(videoNode, 0, 0, tempCanvas.width, tempCanvas.height);

  // Apply pixel matrix styling values to matching current filter choice
  const activeFObj = filters.find(f => f.id === activeFilter);
  if (activeFObj && activeFObj.id !== 'raw') {
    const filteredCanvas = document.createElement('canvas');
    filteredCanvas.width = tempCanvas.width;
    filteredCanvas.height = tempCanvas.height;
    const fCtx = filteredCanvas.getContext('2d');
    if (fCtx) {
      fCtx.filter = activeFObj.css;
      fCtx.drawImage(tempCanvas, 0, 0);
      return filteredCanvas;
    }
  }

  return tempCanvas;
}

function renderStripAsset(framesArray) {
  if (framesArray.length === 0) return;

  const dims = activeLayout.split('x').map(n => parseInt(n, 10));
  const cols = dims[0];
  const rows = dims[1];

  // Base canvas configuration metrics modeling premium paper borders
  const cellWidth = 420;
  const cellHeight = 315; 
  const margin = 28;
  const gap = 16;
  const bottomMetaPadding = 90;

  const canvasWidth = (cols * cellWidth) + ((cols - 1) * gap) + (margin * 2);
  const canvasHeight = (rows * cellHeight) + ((rows - 1) * gap) + (margin * 2) + bottomMetaPadding;

  const outputCanvas = document.createElement('canvas');
  outputCanvas.width = canvasWidth;
  outputCanvas.height = canvasHeight;
  const ctx = outputCanvas.getContext('2d');
  if (!ctx) return;

  // Fill card background texture layer (Using matching premium card tones)
  const isLightTheme = document.documentElement.getAttribute('data-theme') === 'light';
  ctx.fillStyle = isLightTheme ? '#fffef9' : '#f5f0e8'; 
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  // Render slots array matching chronological sequence bounds
  let frameCounter = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (frameCounter >= framesArray.length) break;
      
      const x = margin + (c * (cellWidth + gap));
      const y = margin + (r * (cellHeight + gap));

      // Draw image frame box boundaries
      ctx.drawImage(framesArray[frameCounter], x, y, cellWidth, cellHeight);
      
      // Draw inner card framing line
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cellWidth, cellHeight);

      frameCounter++;
    }
  }

  // Draw application signature brand mark information inside lower canvas margin
  const textX = margin;
  const textY = canvasHeight - 42;
  const rightTextX = canvasWidth - margin;

  ctx.fillStyle = 'rgba(26, 22, 18, 0.45)';
  ctx.font = 'normal 11px Courier New, Courier, monospace';
  ctx.textAlign = 'left';
  
  const dString = new Date().toLocaleDateString().toUpperCase();
  const tString = new Date().toLocaleTimeString().toUpperCase();
  ctx.fillText(`DARKROOM BOOTH // ${dString} ${tString}`, textX, textY);

  ctx.textAlign = 'right';
  ctx.fillText(`STOCK: ${filters.find(f=>f.id===activeFilter).name.toUpperCase()} [${activeLayout}]`, rightTextX, textY);

  // Push finalized loss-less .png asset object directly into reactive stack arrays
  const generatedDataUrl = outputCanvas.toDataURL('image/png');
  const stripId = Date.now();
  
  takenStrips.unshift({
    id: stripId,
    url: generatedDataUrl,
    layout: activeLayout,
    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
  });

  refreshGalleryUI();
  showToast("strip compiled successfully");
}

// ── REACTIVE GRID RE-RENDERING INTERFACES ──
function refreshGalleryUI() {
  const count = takenStrips.length;
  
  // Sync count elements
  const mobCtr = document.getElementById('mob-shot-ctr');
  const deskCtr = document.getElementById('desk-shot-ctr');
  if (mobCtr) mobCtr.innerHTML = `${count} <small>shots</small>`;
  if (deskCtr) deskCtr.innerHTML = `${count} <small>shots</small>`;

  // Enable or disable session actions
  const mClear = document.getElementById('mob-clear-btn');
  const mDl = document.getElementById('mob-dl-btn');
  const dClear = document.getElementById('desk-clear-btn');
  const dDl = document.getElementById('desk-dl-btn');
  
  if (mClear) mClear.disabled = count === 0;
  if (mDl) mDl.disabled = count === 0;
  if (dClear) dClear.disabled = count === 0;
  if (dDl) dDl.disabled = count === 0;

  // Rebuild the inline mobile filmstrip bar track
  const fsThumbs = document.getElementById('filmstrip-thumbs');
  if (fsThumbs) {
    if (count === 0) {
      fsThumbs.innerHTML = '<span class="fs-empty" id="fs-empty">no shots yet</span>';
    } else {
      fsThumbs.innerHTML = '';
      takenStrips.forEach(s => {
        const thumbNode = document.createElement('div');
        thumbNode.className = 'fs-thumb';
        thumbNode.onclick = () => { openSheet(); };
        thumbNode.innerHTML = `<img src="${s.url}" alt="Thumbnail">`;
        fsThumbs.appendChild(thumbNode);
      });
    }
  }

  // Populate Slide Drawer Roll Grid Layout & Desktop Aside Grid Panel Layout
  const mobGrid = document.getElementById('mob-pol-grid');
  const deskGrid = document.getElementById('desk-pol-grid');
  
  const emptyStateHtml = `<div class="empty-st"><div class="ei">📷</div><p>your shots<br>will appear<br>here</p></div>`;
  const dEmptyHtml = `<div class="desk-empty"><div class="ei">📷</div><p>your shots<br>will appear<br>here</p></div>`;

  if (count === 0) {
    if (mobGrid) mobGrid.innerHTML = emptyStateHtml;
    if (deskGrid) deskGrid.innerHTML = dEmptyHtml;
    return;
  }

  let htmlContent = '';
  takenStrips.forEach((s, idx) => {
    const tiltValue = ((s.id % 7) - 3.5) * 0.4; 
    htmlContent += `
      <div class="pol" style="--tilt: ${tiltValue}deg">
        <img src="${s.url}" class="pol-img" alt="Captured Strip">
        <div class="pol-foot">
          <div class="p-meta">
            ROLL #${count - idx}<br>
            ${s.timestamp} [${s.layout}]
          </div>
          <div class="p-acts">
            <button class="p-btn" title="Download Image" onclick="downloadSingle(${s.id})">↓</button>
            <button class="p-btn" title="Purge Record" onclick="deleteSingle(${s.id})">×</button>
          </div>
        </div>
      </div>
    `;
  });

  if (mobGrid) mobGrid.innerHTML = htmlContent;
  if (deskGrid) deskGrid.innerHTML = htmlContent;
}

function downloadSingle(id) {
  const strip = takenStrips.find(s => s.id === id);
  if (!strip) return;
  const downloadLink = document.createElement('a');
  downloadLink.href = strip.url;
  downloadLink.download = `darkroom-strip-${id}.png`;
  document.body.appendChild(downloadLink);
  downloadLink.click();
  document.body.removeChild(downloadLink);
}

function deleteSingle(id) {
  takenStrips = takenStrips.filter(s => s.id !== id);
  refreshGalleryUI();
  showToast("purged strip record");
}

function downloadAll() {
  if (takenStrips.length === 0) return;
  takenStrips.forEach(s => downloadSingle(s.id));
}

function clearAll() {
  if (!confirm("Purge entire active session cache?")) return;
  takenStrips = [];
  refreshGalleryUI();
  closeSheet();
  showToast("session history cleared");
}

// ── ANIMATION SHEET TRIGGERS ──
function openSheet() {
  const rSheet = document.getElementById('roll-sheet');
  const rBack = document.getElementById('sheet-backdrop');
  if (rSheet) rSheet.classList.add('open');
  if (rBack) rBack.classList.add('show');
}

function closeSheet() {
  const rSheet = document.getElementById('roll-sheet');
  const rBack = document.getElementById('sheet-backdrop');
  if (rSheet) rSheet.classList.remove('open');
  if (rBack) rBack.classList.remove('show');
}

function showToast(msg) {
  const toastNode = document.getElementById('toast');
  if (!toastNode) return;
  toastNode.innerText = msg;
  toastNode.classList.add('show');
  setTimeout(() => { toastNode.classList.remove('show'); }, 2000);
}

// ── MAIN CORE LIFE RUN CYCLE INITIALIZER ──
window.addEventListener('DOMContentLoaded', () => {
  initThemeSystem();
  buildFilterStrips();
  startCamera();
});
</script>
